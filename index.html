<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1c" />
  <title>Nova Core Idle</title>
  <style>
    :root{
      --bg:#090d17;
      --panel:#121927;
      --panel-2:#0e1522;
      --line:rgba(255,255,255,.08);
      --text:#f6f8ff;
      --muted:#8f9bb2;
      --accent:#67e8f9;
      --accent-2:#7c83ff;
      --good:#55e6a4;
      --warn:#ffd166;
      --danger:#ff6d8b;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at 20% -10%,rgba(124,131,255,.18),transparent 35%),
        radial-gradient(circle at 100% 0,rgba(103,232,249,.10),transparent 30%),
        linear-gradient(180deg,#0b1120,#080b13 72%);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    button{font:inherit}
    .app{
      width:min(100%,480px);
      margin:0 auto;
      min-height:100vh;
      padding:16px 14px 92px;
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }
    .brand h1{margin:0;font-size:19px;letter-spacing:.7px}
    .brand small{color:var(--muted)}
    .icon-btn{
      width:42px;height:42px;border-radius:14px;
      border:1px solid var(--line);
      background:rgba(18,25,39,.88);
      color:white;
    }
    .hero{
      padding:19px;
      border:1px solid var(--line);
      border-radius:24px;
      background:linear-gradient(145deg,rgba(103,232,249,.07),rgba(18,25,39,.96));
    }
    .eyebrow{
      display:flex;
      justify-content:space-between;
      gap:12px;
      color:var(--muted);
      font-size:11px;
      text-transform:uppercase;
      letter-spacing:1.2px;
    }
    .money{
      margin:8px 0 4px;
      font-size:38px;
      font-weight:900;
      letter-spacing:-1.3px;
      overflow-wrap:anywhere;
    }
    .income{color:var(--good);font-weight:850;font-size:14px}
    .metrics{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:8px;
      margin-top:15px;
    }
    .metric{
      padding:10px;
      border:1px solid var(--line);
      border-radius:13px;
      background:rgba(255,255,255,.025);
    }
    .metric b{display:block;font-size:13px}
    .metric span{display:block;margin-top:2px;color:var(--muted);font-size:9px}
    .smart-status{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:12px;
      padding:10px 12px;
      border-radius:14px;
      border:1px solid rgba(103,232,249,.14);
      background:rgba(103,232,249,.05);
    }
    .smart-status strong{font-size:12px}
    .smart-status small{display:block;color:var(--muted);font-size:10px;margin-top:2px}
    .status-dot{
      flex:0 0 auto;
      width:10px;height:10px;border-radius:50%;
      background:var(--good);
      box-shadow:0 0 0 5px rgba(85,230,164,.08);
    }
    .core-wrap{
      display:grid;
      place-items:center;
      padding:28px 0 20px;
    }
    .core{
      width:186px;height:186px;border-radius:50%;
      border:0;color:white;position:relative;
      background:
        radial-gradient(circle at 34% 27%,rgba(255,255,255,.78),rgba(103,232,249,.13) 10%,rgba(124,131,255,.22) 34%,#0c1727 72%),
        conic-gradient(var(--accent),var(--accent-2),#a664ff,var(--accent));
      box-shadow:
        0 0 0 9px rgba(255,255,255,.025),
        0 0 56px rgba(103,232,249,.18);
      touch-action:manipulation;
    }
    .core:active{transform:scale(.97)}
    .core-inner{
      position:absolute;inset:15px;border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#17213a,#0a101d 74%);
      border:1px solid rgba(255,255,255,.12);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .core-inner small{color:var(--muted);letter-spacing:1.2px}
    .core-inner strong{font-size:29px;margin-top:6px}
    .advisor{
      display:grid;
      grid-template-columns:44px 1fr auto;
      align-items:center;
      gap:10px;
      padding:13px;
      border:1px solid rgba(103,232,249,.14);
      border-radius:17px;
      background:rgba(18,25,39,.82);
    }
    .advisor-icon{
      width:44px;height:44px;border-radius:13px;
      display:grid;place-items:center;
      background:rgba(103,232,249,.08);
      font-size:21px;
    }
    .advisor h3{margin:0 0 4px;font-size:13px}
    .advisor p{margin:0;color:var(--muted);font-size:10px;line-height:1.4}
    .primary{
      border:0;border-radius:11px;
      padding:9px 11px;
      background:linear-gradient(135deg,var(--accent),#a8f4ff);
      color:#07121c;font-weight:900;
    }
    .section-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin:18px 2px 10px;
    }
    .section-head h2{margin:0;font-size:16px}
    .section-head span{color:var(--accent);font-size:11px}
    .controls{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-bottom:10px;
    }
    .chip-btn{
      border:1px solid var(--line);
      border-radius:12px;
      padding:8px 11px;
      background:rgba(255,255,255,.03);
      color:var(--muted);
      font-weight:800;
    }
    .chip-btn.active{
      color:white;
      border-color:rgba(103,232,249,.28);
      background:rgba(103,232,249,.08);
    }
    .list{display:grid;gap:9px}
    .card{
      display:grid;
      grid-template-columns:50px 1fr auto;
      gap:11px;
      align-items:center;
      padding:12px;
      border:1px solid var(--line);
      border-radius:17px;
      background:rgba(18,25,39,.88);
    }
    .card.smart-pick{
      border-color:rgba(103,232,249,.28);
      background:rgba(103,232,249,.055);
    }
    .icon{
      width:50px;height:50px;border-radius:15px;
      display:grid;place-items:center;
      background:linear-gradient(145deg,rgba(124,131,255,.22),rgba(103,232,249,.12));
      font-size:22px;
    }
    .card h3{margin:0 0 4px;font-size:13px}
    .card p{margin:0;color:var(--muted);font-size:10px;line-height:1.4}
    .buy{
      min-width:84px;border:0;border-radius:11px;
      padding:9px 10px;color:white;font-weight:900;
      background:linear-gradient(135deg,var(--accent-2),#9f66ff);
    }
    button:disabled{opacity:.32}
    .bottom{
      position:fixed;
      left:50%;bottom:12px;
      transform:translateX(-50%);
      width:min(calc(100% - 24px),456px);
      height:68px;
      border:1px solid var(--line);
      border-radius:22px;
      background:rgba(9,14,25,.94);
      backdrop-filter:blur(18px);
      display:grid;
      grid-template-columns:repeat(3,1fr);
      z-index:30;
    }
    .nav{
      border:0;background:none;color:var(--muted);
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      gap:4px;font-size:10px;
    }
    .nav.active{color:var(--accent)}
    .nav strong{font-size:20px}
    .toast{
      position:fixed;top:18px;left:50%;
      transform:translate(-50%,-140%);
      z-index:80;
      max-width:calc(100% - 30px);
      overflow:hidden;text-overflow:ellipsis;
      white-space:nowrap;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 15px;
      background:#121a2d;
      font-size:12px;
      transition:.25s;
    }
    .toast.show{transform:translate(-50%,0)}
    .float{
      position:fixed;pointer-events:none;
      color:var(--accent);font-weight:900;
      z-index:20;animation:up .7s ease-out forwards;
    }
    @keyframes up{to{transform:translateY(-65px);opacity:0}}
    .modal{
      position:fixed;inset:0;
      display:none;align-items:flex-end;justify-content:center;
      background:rgba(2,5,11,.78);
      z-index:70;
    }
    .modal.show{display:flex}
    .sheet{
      width:min(100%,480px);
      padding:22px 18px 28px;
      border:1px solid var(--line);
      border-radius:28px 28px 0 0;
      background:#0d1424;
    }
    .sheet h2{margin-top:0}
    .sheet p{color:var(--muted);line-height:1.55}
    .sheet button{
      width:100%;border:0;border-radius:14px;
      padding:13px;font-weight:900;
      background:linear-gradient(135deg,var(--accent),var(--accent-2));
      color:#07101c;
    }
  </style>
</head>
<body>
<main class="app">
  <div class="top">
    <div class="brand">
      <h1>NOVA CORE</h1>
      <small>Adaptive Idle System</small>
    </div>
    <button class="icon-btn" id="settingsBtn" aria-label="Ayarlar">⚙️</button>
  </div>

  <section class="hero">
    <div class="eyebrow">
      <span>Enerji</span>
      <span id="phaseLabel">Başlangıç Evresi</span>
    </div>
    <div class="money" id="money">0</div>
    <div class="income"><span id="perSecond">0</span> / saniye</div>

    <div class="metrics">
      <div class="metric"><b id="level">1</b><span>SEVİYE</span></div>
      <div class="metric"><b id="efficiency">%100</b><span>VERİM</span></div>
      <div class="metric"><b id="prestige">0</b><span>ÇEKİRDEK</span></div>
    </div>

    <div class="smart-status">
      <div>
        <strong id="uiModeTitle">Akıllı Arayüz Aktif</strong>
        <small id="uiModeText">Sadece gerekli seçenekler gösteriliyor.</small>
      </div>
      <span class="status-dot" id="statusDot"></span>
    </div>
  </section>

  <div class="core-wrap">
    <button class="core" id="coreBtn">
      <span class="core-inner">
        <small>ENERJİ TOPLA</small>
        <strong>+<span id="tapPower">1</span></strong>
      </span>
    </button>
  </div>

  <section class="advisor">
    <div class="advisor-icon">🧠</div>
    <div>
      <h3 id="advisorTitle">Sistem analiz ediyor</h3>
      <p id="advisorText">Bir sonraki en mantıklı hamle hesaplanıyor.</p>
    </div>
    <button class="primary" id="advisorAction">UYGULA</button>
  </section>

  <div class="section-head">
    <h2 id="sectionTitle">Yapılar</h2>
    <span id="smartHint">Akıllı sıralama</span>
  </div>

  <div class="controls" id="buyControls">
    <button class="chip-btn active" data-mode="1">x1</button>
    <button class="chip-btn" data-mode="10">x10</button>
    <button class="chip-btn" data-mode="max">MAX</button>
    <button class="chip-btn active" id="autoToggle">AUTO</button>
  </div>

  <section class="list" id="buildingList"></section>
</main>

<nav class="bottom">
  <button class="nav active" data-view="build"><strong>🏗️</strong>Yapılar</button>
  <button class="nav" data-view="systems"><strong>🤖</strong>Sistemler</button>
  <button class="nav" data-view="core"><strong>✦</strong>Çekirdek</button>
</nav>

<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script>
(() => {
  'use strict';

  const SAVE_KEY = 'novaCoreAdaptiveSave';
  const MAX_OFFLINE_SECONDS = 3 * 60 * 60;

  const buildings = [
    {id:'collector',name:'Enerji Toplayıcı',icon:'🔋',base:15,income:1,unlock:1},
    {id:'extractor',name:'Plazma Çıkarıcı',icon:'⚙️',base:120,income:9,unlock:2},
    {id:'reactor',name:'Füzyon Reaktörü',icon:'⚛️',base:950,income:70,unlock:4},
    {id:'network',name:'Nöral Ağ',icon:'🧠',base:7800,income:560,unlock:7},
    {id:'singularity',name:'Tekillik Çekirdeği',icon:'🌌',base:65000,income:4600,unlock:11}
  ];

  const defaults = {
    money:0,total:0,level:1,xp:0,prestige:0,
    buyMode:'1',auto:true,view:'build',
    owned:{collector:0,extractor:0,reactor:0,network:0,singularity:0},
    lastSeen:Date.now()
  };

  const $ = s => document.querySelector(s);
  const refs = {
    money:$('#money'),perSecond:$('#perSecond'),level:$('#level'),
    efficiency:$('#efficiency'),prestige:$('#prestige'),tapPower:$('#tapPower'),
    phaseLabel:$('#phaseLabel'),uiModeTitle:$('#uiModeTitle'),uiModeText:$('#uiModeText'),
    statusDot:$('#statusDot'),advisorTitle:$('#advisorTitle'),advisorText:$('#advisorText'),
    advisorAction:$('#advisorAction'),sectionTitle:$('#sectionTitle'),
    smartHint:$('#smartHint'),buyControls:$('#buyControls'),buildingList:$('#buildingList'),
    autoToggle:$('#autoToggle'),toast:$('#toast'),modal:$('#modal'),sheet:$('#sheet')
  };

  let state = loadState();
  let lastFrame = performance.now();
  let lastUi = 0;
  let lastAuto = 0;
  let modalOpen = false;

  function finite(value,fallback=0){
    const n=Number(value);
    return Number.isFinite(n)&&n>=0?n:fallback;
  }

  function loadState(){
    try{
      const raw=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
      if(!raw)return structuredClone(defaults);
      const safe={
        ...defaults,...raw,
        money:finite(raw.money),
        total:finite(raw.total),
        level:Math.max(1,Math.floor(finite(raw.level,1))),
        xp:finite(raw.xp),
        prestige:Math.floor(finite(raw.prestige)),
        buyMode:['1','10','max'].includes(raw.buyMode)?raw.buyMode:'1',
        auto:raw.auto!==false,
        view:['build','systems','core'].includes(raw.view)?raw.view:'build',
        lastSeen:finite(raw.lastSeen,Date.now()),
        owned:{...defaults.owned,...(raw.owned||{})}
      };
      for(const key of Object.keys(safe.owned)){
        safe.owned[key]=Math.floor(finite(safe.owned[key]));
      }
      return safe;
    }catch{
      return structuredClone(defaults);
    }
  }

  function saveState(){
    state.lastSeen=Date.now();
    localStorage.setItem(SAVE_KEY,JSON.stringify(state));
  }

  function format(n){
    n=finite(n);
    if(n<1000)return Math.floor(n).toLocaleString('tr-TR');
    const units=['K','M','B','T','Qa','Qi'];
    let i=-1;
    while(n>=1000&&i<units.length-1){n/=1000;i++}
    return n.toLocaleString('tr-TR',{maximumFractionDigits:n<10?2:1})+units[i];
  }

  function phase(){
    if(state.level<4)return {name:'Başlangıç Evresi',speed:1};
    if(state.level<8)return {name:'Büyüme Evresi',speed:1.08};
    if(state.level<14)return {name:'İleri Evre',speed:1.16};
    return {name:'Tekillik Evresi',speed:1.25};
  }

  function globalMultiplier(){
    return (1+state.prestige*.20)*phase().speed;
  }

  function balanceEfficiency(){
    const levels=Object.values(state.owned);
    const max=Math.max(1,...levels);
    const min=Math.min(...levels);
    const spread=max-min;
    return Math.max(.82,1-Math.min(.18,spread*.008));
  }

  function income(){
    return buildings.reduce((sum,b)=>sum+state.owned[b.id]*b.income,0)*globalMultiplier()*balanceEfficiency();
  }

  function tapPower(){
    return Math.max(1,Math.floor((1+state.level*.45)*globalMultiplier()));
  }

  function xpNeed(){
    return Math.floor(85*Math.pow(1.16,state.level-1));
  }

  function addXp(amount){
    state.xp+=amount;
    let leveled=false;
    while(state.xp>=xpNeed()){
      state.xp-=xpNeed();
      state.level++;
      leveled=true;
    }
    if(leveled)toast('Seviye '+state.level);
  }

  function priceAtLevel(b,level){
    const stageFactor=1+Math.max(0,phase().speed-1)*.12;
    return Math.max(1,Math.floor(b.base*Math.pow(1.135*stageFactor,level)));
  }

  function totalPrice(b,count){
    let sum=0;
    for(let i=0;i<count;i++)sum+=priceAtLevel(b,state.owned[b.id]+i);
    return sum;
  }

  function maxAffordable(b,limit=500){
    let count=0;
    let spent=0;
    while(count<limit){
      const next=priceAtLevel(b,state.owned[b.id]+count);
      if(spent+next>state.money)break;
      spent+=next;
      count++;
    }
    return count;
  }

  function quantityFor(b){
    if(state.buyMode==='1')return 1;
    if(state.buyMode==='10')return 10;
    return maxAffordable(b);
  }

  function availableBuildings(){
    return buildings.filter(b=>state.level>=b.unlock);
  }

  function metricsFor(b){
    const quantity=state.buyMode==='max'?Math.max(1,Math.min(maxAffordable(b),10)):Number(state.buyMode);
    const cost=totalPrice(b,quantity);
    const gain=b.income*quantity*globalMultiplier()*balanceEfficiency();
    const payback=cost/Math.max(.01,gain);
    const lowestLevel=Math.min(...availableBuildings().map(x=>state.owned[x.id]));
    const balanceBonus=state.owned[b.id]===lowestLevel?1.25:1;
    const score=(gain/Math.max(1,cost))*balanceBonus/(1+payback/180);
    return {b,quantity,cost,gain,payback,score,afford:state.money>=cost};
  }

  function smartChoice(affordableOnly=false){
    let list=availableBuildings().map(metricsFor);
    if(affordableOnly)list=list.filter(x=>x.afford);
    if(!list.length)return null;
    return list.sort((a,b)=>b.score-a.score)[0];
  }

  function smartUiMode(){
    const available=availableBuildings().length;
    if(state.view==='systems')return 'systems';
    if(state.view==='core')return 'core';
    if(available<=2)return 'simple';
    return 'advanced';
  }

  function buyBuilding(id,count,silent=false){
    const b=buildings.find(x=>x.id===id);
    if(!b||state.level<b.unlock)return false;
    const amount=Math.max(1,count);
    const cost=totalPrice(b,amount);
    if(state.money<cost)return false;
    state.money-=cost;
    state.owned[id]+=amount;
    addXp(5*amount);
    saveState();
    if(!silent)toast(b.name+' x'+amount);
    render();
    return true;
  }

  function toast(text){
    refs.toast.textContent=text;
    refs.toast.classList.add('show');
    clearTimeout(window.toastTimer);
    window.toastTimer=setTimeout(()=>refs.toast.classList.remove('show'),1500);
  }

  function openSheet(title,body,action,label='Tamam'){
    modalOpen=true;
    refs.sheet.innerHTML=`<h2>${title}</h2><p>${body}</p><button id="sheetAction">${label}</button>`;
    refs.modal.classList.add('show');
    $('#sheetAction').onclick=()=>action?.();
  }

  function closeSheet(){
    modalOpen=false;
    refs.modal.classList.remove('show');
  }

  function renderBuildView(){
    refs.sectionTitle.textContent='Yapılar';
    refs.smartHint.textContent='Akıllı sıralama';
    refs.buyControls.style.display='flex';

    const choice=smartChoice(false);
    refs.buildingList.innerHTML=buildings.map(b=>{
      const locked=state.level<b.unlock;
      const quantity=quantityFor(b);
      const displayQuantity=state.buyMode==='max'?quantity:Number(state.buyMode);
      const cost=locked||displayQuantity<1?0:totalPrice(b,displayQuantity);
      const picked=choice&&choice.b.id===b.id;
      return `<article class="card ${picked?'smart-pick':''}" style="${locked?'opacity:.45':''}">
        <div class="icon">${b.icon}</div>
        <div>
          <h3>${b.name} · Lv.${state.owned[b.id]}</h3>
          <p>${locked
            ? 'Seviye '+b.unlock+' gerekli'
            : '+'+format(b.income*globalMultiplier()*balanceEfficiency())+'/sn · '+(picked?'AI önerisi · ':'')+(state.buyMode==='max'?'MAX '+displayQuantity:'x'+displayQuantity)}
          </p>
        </div>
        <button class="buy" data-buy="${b.id}" ${locked||displayQuantity<1||state.money<cost?'disabled':''}>${locked?'Kilitli':format(cost)}</button>
      </article>`;
    }).join('');
  }

  function renderSystemsView(){
    refs.sectionTitle.textContent='Akıllı Sistemler';
    refs.smartHint.textContent='Otomatik yönetim';
    refs.buyControls.style.display='none';

    const choice=smartChoice(false);
    refs.buildingList.innerHTML=`
      <article class="card smart-pick">
        <div class="icon">🤖</div>
        <div>
          <h3>Akıllı Satın Alma</h3>
          <p>${state.auto?'Açık · Sistem uygun olduğunda en iyi yatırımı yapıyor.':'Kapalı · Kontrol tamamen sende.'}</p>
        </div>
        <button class="buy" id="inlineAuto">${state.auto?'Kapat':'Aç'}</button>
      </article>
      <article class="card">
        <div class="icon">🧭</div>
        <div>
          <h3>Akıllı Arayüz</h3>
          <p>${smartUiMode()==='simple'?'Başlangıç için sade görünüm kullanılıyor.':'İlerlemen arttığı için detaylı görünüm kullanılıyor.'}</p>
        </div>
        <button class="buy" disabled>Aktif</button>
      </article>
      <article class="card">
        <div class="icon">📊</div>
        <div>
          <h3>Akıllı Dengeleme</h3>
          <p>Mevcut verim %${Math.round(balanceEfficiency()*100)} · Yapılar arası fark büyürse sistem bunu hesaba katıyor.</p>
        </div>
        <button class="buy" disabled>%${Math.round(balanceEfficiency()*100)}</button>
      </article>
      <article class="card">
        <div class="icon">💡</div>
        <div>
          <h3>Mevcut Tavsiye</h3>
          <p>${choice?choice.b.name+' · '+Math.max(1,Math.round(choice.payback))+' sn geri dönüş · +'+format(choice.gain)+'/sn':'Yeni yatırım bekleniyor.'}</p>
        </div>
        <button class="buy" id="inlineAdvice" ${!choice||!choice.afford?'disabled':''}>Uygula</button>
      </article>`;
  }

  function renderCoreView(){
    refs.sectionTitle.textContent='Çekirdek Sıçraması';
    refs.smartHint.textContent='Kalıcı ilerleme';
    refs.buyControls.style.display='none';

    const gain=Math.floor(Math.sqrt(state.total/1_000_000));
    refs.buildingList.innerHTML=`
      <article class="card smart-pick">
        <div class="icon">✦</div>
        <div>
          <h3>Çekirdek Puanı</h3>
          <p>Şu an ${state.prestige} puanın var. Her puan kalıcı +%20 üretim sağlar.</p>
        </div>
        <button class="buy" disabled>${state.prestige}</button>
      </article>
      <article class="card">
        <div class="icon">🚀</div>
        <div>
          <h3>Yeni Döngü</h3>
          <p>${gain>0?'Şimdi sıfırlarsan '+gain+' çekirdek puanı kazanırsın.':'İlk sıçrama için toplam 1M enerji üretmelisin.'}</p>
        </div>
        <button class="buy" id="coreReset" ${gain<1?'disabled':''}>${gain>0?'Sıçra':'Hazır Değil'}</button>
      </article>`;
  }

  function renderAdvisor(){
    const mode=smartUiMode();

    if(mode==='systems'){
      refs.advisorTitle.textContent=state.auto?'Otomasyon çalışıyor':'Otomasyon kapalı';
      refs.advisorText.textContent=state.auto?'Sistem, paranı boşa harcamadan uygun yatırımı bekliyor.':'Akıllı satın alma kapalı; öneriler görünmeye devam eder.';
      refs.advisorAction.textContent=state.auto?'KAPAT':'AÇ';
      refs.advisorAction.disabled=false;
      return;
    }

    if(mode==='core'){
      const gain=Math.floor(Math.sqrt(state.total/1_000_000));
      refs.advisorTitle.textContent=gain>0?'Çekirdek sıçraması hazır':'Çekirdek henüz hazır değil';
      refs.advisorText.textContent=gain>0?gain+' kalıcı puan kazanabilirsin.':'Toplam '+format(state.total)+' / 1M enerji.';
      refs.advisorAction.textContent='GÖR';
      refs.advisorAction.disabled=false;
      return;
    }

    const choice=smartChoice(false);
    if(!choice){
      refs.advisorTitle.textContent='Yeni yatırım bekleniyor';
      refs.advisorText.textContent='Seviye yükseldikçe yeni yapılar açılacak.';
      refs.advisorAction.disabled=true;
      return;
    }

    refs.advisorTitle.textContent=choice.afford?choice.b.name+' öneriliyor':format(choice.cost-state.money)+' enerji daha gerekli';
    refs.advisorText.textContent=`x${choice.quantity} · ${Math.max(1,Math.round(choice.payback))} sn geri dönüş · +${format(choice.gain)}/sn`;
    refs.advisorAction.textContent='UYGULA';
    refs.advisorAction.disabled=!choice.afford;
  }

  function render(){
    refs.money.textContent=format(state.money);
    refs.perSecond.textContent=format(income());
    refs.level.textContent=state.level;
    refs.efficiency.textContent='%'+Math.round(balanceEfficiency()*100);
    refs.prestige.textContent=state.prestige;
    refs.tapPower.textContent=format(tapPower());
    refs.phaseLabel.textContent=phase().name;

    const mode=smartUiMode();
    refs.uiModeTitle.textContent=mode==='simple'?'Akıllı Arayüz: Sade':mode==='advanced'?'Akıllı Arayüz: Gelişmiş':'Akıllı Arayüz Aktif';
    refs.uiModeText.textContent=mode==='simple'
      ?'Yeni oyuncu için sadece temel bilgiler gösteriliyor.'
      :mode==='advanced'
        ?'İlerleme arttığı için detaylı karar bilgileri gösteriliyor.'
        :'Bu bölüm için gerekli kontroller gösteriliyor.';

    refs.autoToggle.textContent=state.auto?'AUTO AÇIK':'AUTO KAPALI';
    refs.autoToggle.classList.toggle('active',state.auto);

    document.querySelectorAll('.chip-btn[data-mode]').forEach(btn=>{
      btn.classList.toggle('active',btn.dataset.mode===state.buyMode);
    });

    document.querySelectorAll('.nav').forEach(btn=>{
      btn.classList.toggle('active',btn.dataset.view===state.view);
    });

    renderAdvisor();

    if(state.view==='build')renderBuildView();
    if(state.view==='systems')renderSystemsView();
    if(state.view==='core')renderCoreView();
  }

  function offlineReward(){
    const now=Date.now();
    const elapsed=Math.max(0,Math.min((now-state.lastSeen)/1000,MAX_OFFLINE_SECONDS));
    const reward=income()*elapsed*.8;

    state.lastSeen=now;
    localStorage.setItem(SAVE_KEY,JSON.stringify(state));

    if(reward>=1){
      state.money+=reward;
      state.total+=reward;
      saveState();
      setTimeout(()=>openSheet(
        'ÇEVRİMDIŞI KAZANÇ',
        `${Math.floor(elapsed/60)} dakika boyunca sistem çalıştı.<br><br><b>+${format(reward)}</b> enerji`,
        closeSheet,
        'Topla'
      ),250);
    }
  }

  $('#coreBtn').addEventListener('pointerdown',e=>{
    const gain=tapPower();
    state.money+=gain;
    state.total+=gain;
    addXp(1);

    refs.money.textContent=format(state.money);

    const f=document.createElement('div');
    f.className='float';
    f.textContent='+'+format(gain);
    f.style.left=(e.clientX-15)+'px';
    f.style.top=(e.clientY-10)+'px';
    document.body.appendChild(f);
    setTimeout(()=>f.remove(),700);

    navigator.vibrate?.(8);
  });

  refs.advisorAction.addEventListener('click',()=>{
    if(state.view==='systems'){
      state.auto=!state.auto;
      saveState();
      render();
      toast(state.auto?'Otomasyon açıldı':'Otomasyon kapatıldı');
      return;
    }

    if(state.view==='core'){
      state.view='core';
      saveState();
      render();
      return;
    }

    const choice=smartChoice(true);
    if(choice)buyBuilding(choice.b.id,choice.quantity);
  });

  refs.buildingList.addEventListener('click',e=>{
    const buy=e.target.closest('[data-buy]');
    if(buy){
      const b=buildings.find(x=>x.id===buy.dataset.buy);
      if(!b)return;
      const quantity=quantityFor(b);
      if(quantity>0)buyBuilding(b.id,quantity);
      return;
    }

    if(e.target.closest('#inlineAuto')){
      state.auto=!state.auto;
      saveState();
      render();
      return;
    }

    if(e.target.closest('#inlineAdvice')){
      const choice=smartChoice(true);
      if(choice)buyBuilding(choice.b.id,choice.quantity);
      return;
    }

    if(e.target.closest('#coreReset')){
      const gain=Math.floor(Math.sqrt(state.total/1_000_000));
      if(gain<1)return;
      openSheet(
        'ÇEKİRDEK SIÇRAMASI',
        `İlerleme sıfırlanır ve <b>${gain}</b> kalıcı çekirdek puanı kazanırsın.`,
        ()=>{
          const prestige=state.prestige+gain;
          state=structuredClone(defaults);
          state.prestige=prestige;
          state.lastSeen=Date.now();
          saveState();
          closeSheet();
          render();
          toast('Çekirdek sıçraması tamamlandı');
        },
        'Sıçra'
      );
    }
  });

  refs.buyControls.addEventListener('click',e=>{
    const mode=e.target.closest('[data-mode]');
    if(mode){
      state.buyMode=mode.dataset.mode;
      saveState();
      render();
      return;
    }
    if(e.target.closest('#autoToggle')){
      state.auto=!state.auto;
      saveState();
      render();
      toast(state.auto?'Otomasyon açıldı':'Otomasyon kapatıldı');
    }
  });

  document.querySelectorAll('.nav').forEach(btn=>{
    btn.addEventListener('click',()=>{
      state.view=btn.dataset.view;
      saveState();
      render();
    });
  });

  $('#settingsBtn').addEventListener('click',()=>{
    const choice=smartChoice(false);
    openSheet(
      'SİSTEM DURUMU',
      `Akıllı arayüz: <b>${smartUiMode()}</b><br>
       Otomasyon: <b>${state.auto?'Açık':'Kapalı'}</b><br>
       Satın alma modu: <b>${state.buyMode==='max'?'MAX':'x'+state.buyMode}</b><br>
       Denge verimi: <b>%${Math.round(balanceEfficiency()*100)}</b><br>
       Mevcut öneri: <b>${choice?choice.b.name:'Yok'}</b><br>
       Çevrimdışı sınır: <b>3 saat</b>`,
      closeSheet,
      'Tamam'
    );
  });

  refs.modal.addEventListener('click',e=>{
    if(e.target===refs.modal)closeSheet();
  });

  function loop(now){
    const dt=Math.min(.25,Math.max(0,(now-lastFrame)/1000));
    lastFrame=now;

    if(!document.hidden){
      const gain=income()*dt;
      if(gain>0){
        state.money+=gain;
        state.total+=gain;
      }

      if(state.auto&&now-lastAuto>=3000){
        lastAuto=now;
        const choice=smartChoice(true);
        if(choice&&choice.payback<=180){
          buyBuilding(choice.b.id,choice.quantity,true);
        }
      }

      if(now-lastUi>=300){
        lastUi=now;
        refs.money.textContent=format(state.money);
        refs.perSecond.textContent=format(income());
        refs.tapPower.textContent=format(tapPower());
      }
    }

    requestAnimationFrame(loop);
  }

  document.addEventListener('visibilitychange',()=>{
    lastFrame=performance.now();
    if(document.hidden)saveState();
  });

  window.addEventListener('pagehide',saveState);
  setInterval(()=>{saveState();if(!modalOpen)render()},3000);

  offlineReward();
  render();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
