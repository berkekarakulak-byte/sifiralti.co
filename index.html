<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<meta name="theme-color" content="#07101b">
<title>Underworld City V14 Stable</title>
<style>
:root{--bg:#07101b;--panel:#101b2a;--panel2:#162438;--line:#29415f;--text:#f7f9fc;--muted:#9eb0c6;--gold:#f5c85b;--green:#59d98d;--red:#ff6672;--blue:#58a8ff}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:linear-gradient(#07101b,#0a1320);color:var(--text);font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}button{font:inherit;touch-action:manipulation}.app{max-width:520px;margin:auto;min-height:100vh;padding-bottom:86px}.top{position:sticky;top:0;z-index:20;background:rgba(7,16,27,.95);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);padding:10px 12px}.toprow{display:flex;align-items:center;gap:10px}.avatar{width:44px;height:44px;border-radius:14px;background:#162438;border:1px solid #2f496b;display:grid;place-items:center;font-size:24px}.wallet{flex:1;min-width:0}.label{font-size:10px;color:var(--muted);font-weight:800;letter-spacing:.12em}.cash{font-size:23px;font-weight:950;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.pills{display:flex;gap:6px}.pill{padding:8px 9px;background:#111d2d;border:1px solid #2a4261;border-radius:12px;font-size:12px;font-weight:900}.xprow{display:flex;gap:8px;align-items:center;margin-top:7px;font-size:11px;color:var(--muted)}.bar{height:9px;border-radius:999px;background:#1d2a3d;border:1px solid #2b405d;overflow:hidden;flex:1}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--gold),#ff9f43);width:0;transition:.2s}.screen{display:none}.screen.active{display:block}.city-wrap{padding:12px}.city{position:relative;min-height:590px;border-radius:24px;overflow:hidden;border:1px solid #2e4666;background:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px),radial-gradient(circle at 50% 15%,rgba(88,168,255,.16),transparent 30%),linear-gradient(180deg,#12243a,#0a1421);background-size:34px 34px,34px 34px,auto,auto}.city-head{position:absolute;left:14px;right:14px;top:14px;z-index:2;display:flex;justify-content:space-between;gap:10px}.city-title,.combo{background:rgba(7,16,27,.84);border:1px solid #2b4565;border-radius:14px;padding:9px 11px}.city-title b{display:block}.city-title small,.combo small{color:var(--muted)}.combo{text-align:right}.combo strong{display:block;color:var(--green)}.building{position:absolute;width:120px;min-height:120px;border-radius:18px;padding:9px;background:linear-gradient(180deg,#1b2b41,#111b29);border:1px solid #365276;box-shadow:0 12px 28px rgba(0,0,0,.28)}.building.locked{filter:grayscale(.85);opacity:.7}.building.ready{outline:2px solid var(--gold);animation:pulse 1.2s infinite}.building-main{width:100%;border:0;background:none;color:#fff;text-align:left;padding:0}.building-main .emoji{font-size:33px;display:block}.building-main b{font-size:13px;display:block;margin-top:3px}.building-main small{font-size:10px;color:var(--muted)}.income{color:var(--green);font-weight:900;font-size:12px;margin-top:4px}.building-actions{display:grid;grid-template-columns:1fr auto;gap:5px;margin-top:7px}.mini{border:1px solid #3b587b;background:#243650;color:#fff;border-radius:9px;padding:6px 7px;font-size:10px;font-weight:850}.mini.gold{background:var(--gold);color:#1b1405;border-color:var(--gold)}@keyframes pulse{50%{box-shadow:0 0 0 8px rgba(245,200,91,.08),0 12px 28px rgba(0,0,0,.28)}}.enemy{position:absolute;right:16px;bottom:20px;width:138px;padding:12px;border-radius:18px;background:linear-gradient(180deg,#3a1720,#1b1015);border:1px solid #7d3541;z-index:3}.enemy.hidden{display:none}.enemy b{display:block}.enemy small{color:#ffb3ba}.enemy .bar{margin:7px 0}.section{padding:12px}.head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.head h2{margin:0;font-size:18px}.head span{font-size:11px;color:var(--muted)}.card{background:linear-gradient(180deg,var(--panel),#0c1521);border:1px solid var(--line);border-radius:18px;padding:13px}.row{display:flex;align-items:center;gap:10px}.grow{flex:1;min-width:0}.icon{width:50px;height:50px;border-radius:15px;background:#1b2b41;border:1px solid #354f71;display:grid;place-items:center;font-size:27px}.name{font-weight:900}.meta{font-size:11px;color:var(--muted);margin-top:3px}.btn{border:0;border-radius:13px;padding:10px 12px;font-weight:900}.gold{background:linear-gradient(#ffe394,var(--gold));color:#1b1405}.dark{background:#24344b;color:#fff;border:1px solid #385271}.red{background:linear-gradient(#ff9098,var(--red));color:#29070b}.green{background:linear-gradient(#86ebb0,var(--green));color:#07180e}.btn:disabled{opacity:.42;filter:grayscale(.8)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.fighter.selected{outline:2px solid var(--gold)}.face{font-size:38px}.stars{color:#ffd66b}.battle-stage{min-height:310px;display:grid;place-items:center;text-align:center}.battle-line{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;width:100%}.unit{padding:14px;border-radius:18px;background:#152236;border:1px solid #2e496a}.unit .face{font-size:48px}.vs{font-weight:950;color:var(--gold)}.log{margin:12px 0;padding:11px;border-radius:12px;background:#0b1420;border:1px solid #293f5d;color:var(--muted);font-size:12px;width:100%}.mission{margin-bottom:10px}.mission .bar{margin:9px 0}.tabs{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:min(520px,100%);z-index:40;display:grid;grid-template-columns:repeat(4,1fr);padding:8px 8px calc(8px + env(safe-area-inset-bottom));background:rgba(7,16,27,.97);border-top:1px solid var(--line)}.tab{border:0;background:none;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px}.tab span{font-size:21px}.tab.active{color:var(--gold)}.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(18px);opacity:0;transition:.2s;background:#07101b;border:1px solid #3b5678;border-radius:12px;padding:10px 14px;z-index:80}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.float{position:fixed;z-index:60;pointer-events:none;font-weight:950;color:var(--gold);animation:floatup .8s forwards}@keyframes floatup{to{transform:translateY(-70px);opacity:0}}@media(max-width:390px){.building{width:108px}.grid2{grid-template-columns:1fr}.battle-line{grid-template-columns:1fr}.vs{display:none}}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="toprow"><div class="avatar">😎</div><div class="wallet"><div class="label">YERALTI SERVETİ</div><div class="cash" id="cash">$0</div></div><div class="pills"><div class="pill">💎 <span id="gems">0</span></div></div></div><div class="xprow"><span>Lv.<b id="level">1</b></span><div class="bar"><i id="xp"></i></div><span id="xpText">0/100</span></div></header>
<main>
<section class="screen active" id="screen-city"><div class="city-wrap"><div class="city"><div class="city-head"><div class="city-title"><b>Karanlık Sokaklar</b><small id="districtText">0/5 işletme</small></div><div class="combo"><small>Dokunma serisi</small><strong id="combo">x1.0</strong></div></div><div id="buildings"></div><div class="enemy hidden" id="enemyCard"><b id="enemyName"></b><small id="enemyPower"></small><div class="bar"><i style="width:100%"></i></div><button class="btn red" id="fightEnemy">Saldır</button></div></div></div></section>
<section class="screen" id="screen-crew"><div class="section"><div class="head"><h2>Ekibin</h2><span>3 kişi seç</span></div><div class="grid2" id="crewList"></div></div></section>
<section class="screen" id="screen-battle"><div class="section"><div class="head"><h2>Sokak Savaşları</h2><span id="stageText"></span></div><div class="card battle-stage" id="battleBox"></div></div></section>
<section class="screen" id="screen-goals"><div class="section"><div class="head"><h2>Hedefler</h2><span>Bitir, yenisi gelsin</span></div><div id="missionList"></div><div class="head" style="margin-top:14px"><h2>Günlük Ödül</h2><span>Her gün</span></div><div class="card" id="dailyBox"></div></div></section>
</main>
<nav class="tabs"><button class="tab active" data-screen="city"><span>🏙️</span>Şehir</button><button class="tab" data-screen="crew"><span>🕶️</span>Ekip</button><button class="tab" data-screen="battle"><span>⚔️</span>Savaş</button><button class="tab" data-screen="goals"><span>🎯</span>Hedefler</button></nav>
</div><div class="toast" id="toast"></div>
<script>
(()=>{
"use strict";
const SAVE="underworld_city_v14_stable";
const $=id=>document.getElementById(id),now=()=>Date.now(),clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
const fmt=n=>{n=Number(n)||0;for(const [v,s] of [[1e12,"T"],[1e9,"B"],[1e6,"M"],[1e3,"K"]])if(n>=v)return"$"+(n/v).toFixed(n>=v*100?0:n>=v*10?1:2)+s;return"$"+n.toFixed(n>=100?0:n>=10?1:2)};
const BUILDINGS=[
{id:"garage",name:"Kaçak Garaj",icon:"🚘",cost:30,income:8,x:7,y:23},
{id:"club",name:"Gece Kulübü",icon:"🎧",cost:240,income:30,x:55,y:22},
{id:"dock",name:"Liman Deposu",icon:"📦",cost:1800,income:140,x:10,y:48},
{id:"casino",name:"Gizli Casino",icon:"🎰",cost:12000,income:650,x:57,y:49},
{id:"tower",name:"Finans Kulesi",icon:"🏦",cost:80000,income:3200,x:33,y:72}
];
const CREW=[
{id:"rico",name:"Rico",face:"🧔🏻",role:"Tank",cost:0,power:75},
{id:"luna",name:"Luna",face:"👩🏻‍🎤",role:"Destek",cost:20,power:110},
{id:"bruno",name:"Bruno",face:"🧔🏽‍♂️",role:"Hasar",cost:35,power:165},
{id:"vera",name:"Vera",face:"👩🏼",role:"Suikastçı",cost:60,power:240}
];
const base=()=>({cash:120,gems:25,level:1,xp:0,totalEarned:0,totalUpgrades:0,wins:0,stage:1,combo:1,comboUntil:0,buildings:{},crew:{},team:["rico"],enemy:null,enemySpawnAt:now()+45000,missions:[],lastDaily:"",lastSave:now()});
let S=base(),battleTimer=null,toastTimer=null,lastUi=0;
function ensure(){S=Object.assign(base(),S||{});S.buildings=S.buildings||{};for(const b of BUILDINGS){const d=S.buildings[b.id]||{};S.buildings[b.id]={level:Math.max(0,+d.level||0),manager:!!d.manager,cycleEnd:Math.max(0,+d.cycleEnd||0)}}S.crew=S.crew||{};for(const c of CREW){const d=S.crew[c.id]||{};S.crew[c.id]={owned:c.id==="rico"||!!d.owned,level:Math.max(1,+d.level||1),stars:clamp(+d.stars||1,1,5)}}S.team=[...new Set((S.team||[]).filter(id=>S.crew[id]?.owned))].slice(0,3);if(!S.team.length)S.team=["rico"];if(!Array.isArray(S.missions)||S.missions.length!==3)refreshMissions()}
function load(){try{const raw=localStorage.getItem(SAVE);if(raw)S=JSON.parse(raw)}catch{}ensure();const sec=clamp((now()-S.lastSave)/1000,0,8*3600),gain=autoIncome()*sec*.65;if(gain>1){earn(gain);setTimeout(()=>toast("Offline kazanç: "+fmt(gain)),300)}}
function save(){S.lastSave=now();try{localStorage.setItem(SAVE,JSON.stringify(S))}catch{}}
function earn(v){v=Math.max(0,Number(v)||0);S.cash+=v;S.totalEarned+=v}
function addXp(v){S.xp+=v;let need=S.level*100;while(S.xp>=need){S.xp-=need;S.level++;S.gems+=3;toast("Seviye atladın! +3 💎");need=S.level*100}}
function bCost(b){return b.cost*Math.pow(1.2,S.buildings[b.id].level)}
function bIncome(b){const l=S.buildings[b.id].level;return l?b.income*l*(1+Math.floor(l/10)*.5):0}
function autoIncome(){return BUILDINGS.reduce((a,b)=>a+(S.buildings[b.id].manager?bIncome(b):0),0)}
function crewPower(){return Math.floor(S.team.reduce((a,id)=>{const c=CREW.find(x=>x.id===id),d=S.crew[id];return a+(c?c.power*d.level*(1+(d.stars-1)*.3):0)},0))}
function toast(m){const e=$("toast");e.textContent=m;e.classList.add("show");clearTimeout(toastTimer);toastTimer=setTimeout(()=>e.classList.remove("show"),1800)}
function floatText(x,y,t){const e=document.createElement("div");e.className="float";e.style.left=x+"px";e.style.top=y+"px";e.textContent=t;document.body.appendChild(e);setTimeout(()=>e.remove(),850)}
function buyBuilding(id){const b=BUILDINGS.find(x=>x.id===id),d=S.buildings[id],c=bCost(b);if(S.cash<c)return toast("Yeterli paran yok.");S.cash-=c;d.level++;S.totalUpgrades++;addXp(7);toast(d.level===1?b.name+" açıldı!":"Bina yükseldi!");renderAll();save()}
function collectBuilding(id,ev){const b=BUILDINGS.find(x=>x.id===id),d=S.buildings[id];if(!d.level)return buyBuilding(id);if(d.manager)return toast("Yönetici otomatik topluyor.");if(now()<d.cycleEnd)return toast("Üretim devam ediyor.");S.combo=now()<S.comboUntil?Math.min(5,S.combo+.2):1;S.comboUntil=now()+1800;const gain=bIncome(b)*S.combo;earn(gain);d.cycleEnd=now()+2200;floatText(ev.clientX,ev.clientY,"+"+fmt(gain));renderTop();renderBuildings();save()}
function upgradeBuilding(id){buyBuilding(id)}
function toggleManager(id){const d=S.buildings[id];if(!d.level)return toast("Önce binayı aç.");if(d.manager){d.manager=false;toast("Yönetici kaldırıldı.")}else{if(S.gems<10)return toast("10 elmas gerekli.");S.gems-=10;d.manager=true;d.cycleEnd=0;toast("Yönetici atandı.")}renderAll();save()}
function spawnEnemy(){if(!S.enemy&&now()>=S.enemySpawnAt)S.enemy={name:["Kızıl Kurtlar","Gece Kartalları","Boğaz Çetesi"][Math.floor(Math.random()*3)],power:Math.max(100,Math.floor(crewPower()*(.8+Math.random()*.5)))}}
function fightEnemy(){if(!S.enemy)return;const win=Math.random()<crewPower()/(crewPower()+S.enemy.power);if(win){const r=Math.max(500,S.enemy.power*10);earn(r);S.wins++;S.gems+=2;toast("Rakip çete yenildi! +2 💎")}else toast("Çete saldırıyı püskürttü.");S.enemy=null;S.enemySpawnAt=now()+60000;renderAll();save()}
function enemyForStage(){const boss=S.stage%5===0;return{name:boss?"Bölge Patronu":"Sokak Çetesi",face:boss?"👹":"🥷",power:Math.floor(100*Math.pow(1.17,S.stage)),boss}}
function startBattle(){if(battleTimer)return;const e=enemyForStage(),p=crewPower();if(!p)return;let ph=p*8,eh=e.power*8;battleTimer=setInterval(()=>{eh-=p*(.18+Math.random()*.12);ph-=e.power*(.14+Math.random()*.1);renderBattleState(e,ph,p*8,eh,e.power*8);if(eh<=0||ph<=0){clearInterval(battleTimer);battleTimer=null;if(eh<=0){earn(e.power*12);S.wins++;S.stage++;S.gems+=e.boss?5:1;toast(e.boss?"BOSS YENİLDİ!":"Savaş kazanıldı!")}else toast("Savaş kaybedildi.");renderAll();save()}},350)}
function renderBattleState(e,ph,pm,eh,em){$("battleBox").innerHTML=`<div class="battle-line"><div class="unit"><div class="face">🕶️</div><b>Ekibin</b><div class="meta">${crewPower()} güç</div><div class="bar"><i style="width:${clamp(ph/pm*100,0,100)}%"></i></div></div><div class="vs">VS</div><div class="unit"><div class="face">${e.face}</div><b>${e.name}</b><div class="meta">${e.power} güç</div><div class="bar"><i style="width:${clamp(eh/em*100,0,100)}%"></i></div></div></div><div class="log">Çatışma sürüyor...</div>`}
function missionStat(t){return t==="earn"?S.totalEarned:t==="upgrade"?S.totalUpgrades:S.wins}
function newMission(ex=[]){const types=["earn","upgrade","battle"].filter(x=>!ex.includes(x)),type=types[Math.floor(Math.random()*types.length)],target=type==="earn"?Math.floor(1500*(1+S.level*.2)):type==="upgrade"?Math.floor(4+S.level/2):Math.floor(2+S.level/3);return{type,target,start:missionStat(type),reward:type==="earn"?3:type==="upgrade"?4:5}}
function refreshMissions(){S.missions=[];const used=[];for(let i=0;i<3;i++){const m=newMission(used);used.push(m.type);S.missions.push(m)}}
function claimMission(i){const m=S.missions[i],p=missionStat(m.type)-m.start;if(p<m.target)return;S.gems+=m.reward;S.missions[i]=newMission(S.missions.map(x=>x.type));toast("Hedef tamamlandı!");renderMissions();renderTop();save()}
function dateKey(){return new Intl.DateTimeFormat("en-CA",{timeZone:"Europe/Istanbul",year:"numeric",month:"2-digit",day:"2-digit"}).format(new Date())}
function claimDaily(){if(S.lastDaily===dateKey())return;S.lastDaily=dateKey();S.gems+=5;toast("+5 💎 günlük ödül");renderDaily();renderTop();save()}
function renderTop(){$("cash").textContent=fmt(S.cash);$("gems").textContent=Math.floor(S.gems);$("level").textContent=S.level;const n=S.level*100;$("xpText").textContent=`${Math.floor(S.xp)}/${n}`;$("xp").style.width=clamp(S.xp/n*100,0,100)+"%";$("combo").textContent="x"+S.combo.toFixed(1)}
function renderBuildings(){const w=$("buildings");w.innerHTML="";let opened=0;for(const b of BUILDINGS){const d=S.buildings[b.id];if(d.level)opened++;const ready=d.level&&!d.manager&&now()>=d.cycleEnd;const el=document.createElement("article");el.className="building"+(!d.level?" locked":"")+(ready?" ready":"");el.style.left=b.x+"%";el.style.top=b.y+"%";el.dataset.id=b.id;el.innerHTML=`<button class="building-main" data-action="collect"><span class="emoji">${b.icon}</span><b>${b.name}</b><small>Lv.${d.level}${d.manager?" · Otomatik":""}</small><div class="income">${d.level?(ready||d.manager?fmt(bIncome(b)):"Üretiyor..."):"Aç "+fmt(bCost(b))}</div></button><div class="building-actions"><button class="mini gold" data-action="upgrade">⬆ ${d.level?fmt(bCost(b)):"Aç"}</button><button class="mini" data-action="manager">${d.manager?"👔 Aktif":"👔 10💎"}</button></div>`;w.appendChild(el)}$("districtText").textContent=`${opened}/${BUILDINGS.length} işletme`}
function renderEnemy(){spawnEnemy();$("enemyCard").classList.toggle("hidden",!S.enemy);if(S.enemy){$("enemyName").textContent=S.enemy.name;$("enemyPower").textContent=S.enemy.power+" güç"}}
function renderCrew(){const w=$("crewList");w.innerHTML="";for(const c of CREW){const d=S.crew[c.id],sel=S.team.includes(c.id),price=d.owned?Math.max(5,Math.ceil(c.cost*.6*d.level)):c.cost,el=document.createElement("div");el.className="card fighter"+(sel?" selected":"");el.dataset.id=c.id;el.innerHTML=`<div class="row"><div class="face">${c.face}</div><div class="grow"><div class="name">${c.name}</div><div class="meta">${c.role} · ${Math.floor(c.power*d.level*(1+(d.stars-1)*.3))} güç</div></div></div><div class="stars">${"★".repeat(d.stars)}${"☆".repeat(5-d.stars)}</div><button class="btn ${d.owned?"dark":"gold"}" style="width:100%;margin-top:8px" data-act="buy">${d.owned?"Geliştir · "+price+" 💎":"İşe Al · "+price+" 💎"}</button><button class="btn ${sel?"green":"dark"}" style="width:100%;margin-top:7px" data-act="team" ${d.owned?"":"disabled"}>${sel?"Ekipte":"Ekibe Ekle"}</button>`;w.appendChild(el)}}
function crewAction(id,act){const c=CREW.find(x=>x.id===id),d=S.crew[id];if(act==="buy"){const price=d.owned?Math.max(5,Math.ceil(c.cost*.6*d.level)):c.cost;if(S.gems<price)return toast("Yeterli elmas yok.");S.gems-=price;d.owned?d.level++:d.owned=true}else{if(!d.owned)return;if(S.team.includes(id)){if(S.team.length===1)return toast("En az 1 kişi kalmalı.");S.team=S.team.filter(x=>x!==id)}else{if(S.team.length>=3)return toast("Ekip dolu.");S.team.push(id)}}renderAll();save()}
function renderBattle(){if(battleTimer)return;const e=enemyForStage();$("stageText").textContent=`Bölüm ${S.stage}${e.boss?" · BOSS":""}`;$("battleBox").innerHTML=`<div class="battle-line"><div class="unit"><div class="face">🕶️</div><b>Ekibin</b><div class="meta">${crewPower()} güç</div></div><div class="vs">VS</div><div class="unit"><div class="face">${e.face}</div><b>${e.name}</b><div class="meta">${e.power} güç</div></div></div><div class="log">Kısa savaşa hazır.</div><button class="btn gold" style="width:100%" id="startBattle">Savaşı Başlat</button>`}
function renderMissions(){const w=$("missionList");w.innerHTML="";S.missions.forEach((m,i)=>{const p=missionStat(m.type)-m.start,label=m.type==="earn"?`${fmt(m.target)} kazan`:m.type==="upgrade"?`${m.target} yükseltme yap`:`${m.target} savaş kazan`,pct=clamp(p/m.target*100,0,100);w.innerHTML+=`<div class="card mission" data-i="${i}"><div class="row"><div class="grow"><div class="name">${label}</div><div class="meta">${Math.floor(Math.min(p,m.target))}/${m.target}</div></div><b>${m.reward} 💎</b></div><div class="bar"><i style="width:${pct}%"></i></div><button class="btn ${p>=m.target?"gold":"dark"}" style="width:100%" ${p>=m.target?"":"disabled"}>Ödülü Al</button></div>`})}
function renderDaily(){$("dailyBox").innerHTML=`<div class="row"><div class="icon">🎁</div><div class="grow"><div class="name">Günlük Kasa</div><div class="meta">Her gün 5 elmas</div></div><button class="btn green" id="dailyBtn" ${S.lastDaily===dateKey()?"disabled":""}>${S.lastDaily===dateKey()?"Alındı":"Al"}</button></div>`}
function renderAll(){renderTop();renderBuildings();renderEnemy();renderCrew();renderBattle();renderMissions();renderDaily()}
function bind(){document.querySelector(".tabs").addEventListener("click",e=>{const b=e.target.closest(".tab");if(!b)return;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));b.classList.add("active");$("screen-"+b.dataset.screen).classList.add("active");renderAll()});$("buildings").addEventListener("click",e=>{const card=e.target.closest(".building"),btn=e.target.closest("[data-action]");if(!card||!btn)return;const id=card.dataset.id;if(btn.dataset.action==="collect")collectBuilding(id,e);else if(btn.dataset.action==="upgrade")upgradeBuilding(id);else toggleManager(id)});$("fightEnemy").addEventListener("click",fightEnemy);$("crewList").addEventListener("click",e=>{const c=e.target.closest("[data-id]"),b=e.target.closest("[data-act]");if(c&&b)crewAction(c.dataset.id,b.dataset.act)});$("battleBox").addEventListener("click",e=>{if(e.target.closest("#startBattle"))startBattle()});$("missionList").addEventListener("click",e=>{const c=e.target.closest("[data-i]");if(c)claimMission(+c.dataset.i)});$("dailyBox").addEventListener("click",e=>{if(e.target.closest("#dailyBtn"))claimDaily()});window.addEventListener("beforeunload",save)}
function loop(){const t=now();if(t>S.comboUntil)S.combo=1;for(const b of BUILDINGS){const d=S.buildings[b.id];if(d.manager&&d.level)earn(bIncome(b)/4)}spawnEnemy();renderTop();if(t-lastUi>1000){lastUi=t;if(document.querySelector("#screen-city.active")){renderBuildings();renderEnemy()}if(document.querySelector("#screen-goals.active"))renderMissions()}}
load();bind();renderAll();setInterval(loop,250);setInterval(save,5000);
})();
</script>
</body>
</html>
