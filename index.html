<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Car Dealer Tycoon</title>
<style>
:root{--bg:#0a0f17;--p:#121a26;--p2:#182333;--l:#2d3d53;--t:#f5f7fb;--m:#9bacbf;--g:#f4c45e;--ok:#57d68a;--r:#ff6874;--b:#5ca9ff}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#09101a,#0e1520);color:var(--t);font-family:system-ui,-apple-system,sans-serif}.app{max-width:560px;margin:auto;min-height:100vh;padding-bottom:88px}
header{position:sticky;top:0;z-index:10;background:#0a0f17ee;border-bottom:1px solid var(--l);padding:10px 12px}.row{display:flex;gap:10px;align-items:center}.grow{flex:1}.logo,.icon{display:grid;place-items:center;background:var(--p2);border:1px solid var(--l);border-radius:15px}.logo{width:46px;height:46px;font-size:25px}.icon{width:54px;height:54px;font-size:29px}
.label{font-size:10px;color:var(--m);letter-spacing:.12em;font-weight:800}.money{font-size:23px;font-weight:900;color:var(--g)}.pill{padding:8px 10px;background:var(--p);border:1px solid var(--l);border-radius:12px;font-weight:800}
.bar{height:9px;background:#1d2a3c;border:1px solid #2d415b;border-radius:99px;overflow:hidden;flex:1}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--g),#ff9c48)}
.level{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:11px;color:var(--m)}
.screen{display:none}.screen.active{display:block}.section{padding:12px}.hero{padding:16px;border-radius:22px;background:linear-gradient(135deg,#1b293d,#101824);border:1px solid #344b68}.hero h1{margin:8px 0 5px;font-size:24px}.hero p,.meta{color:var(--m);font-size:12px}.stats,.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.stat,.card{background:linear-gradient(var(--p),#0d1520);border:1px solid var(--l);border-radius:17px;padding:12px}.stat{text-align:center}.stat b{display:block}
.head{display:flex;justify-content:space-between;align-items:center;margin:16px 2px 10px}.head h2{font-size:18px;margin:0}.head span{font-size:11px;color:var(--m)}.list{display:grid;gap:10px}.name{font-weight:900}.price{font-weight:900;color:var(--g)}
.btn{border:0;border-radius:12px;padding:10px 12px;font-weight:900}.btn:disabled{opacity:.4}.gold{background:var(--g);color:#201600}.dark{background:#26364b;color:white;border:1px solid #3b526f}.green{background:var(--ok);color:#07180e}.red{background:var(--r);color:#2a070a}.blue{background:var(--b);color:#07182c}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(560px,100%);display:grid;grid-template-columns:repeat(5,1fr);background:#0a0f17f7;border-top:1px solid var(--l);padding:8px 6px}.tab{background:none;border:0;color:var(--m);display:flex;flex-direction:column;align-items:center;font-size:10px}.tab span{font-size:21px}.tab.active{color:var(--g)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(15px);opacity:0;transition:.2s;background:#09111b;border:1px solid #3b5574;border-radius:12px;padding:10px 14px}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:390px){.stats,.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header>
<div class="row"><div class="logo">🚗</div><div class="grow"><div class="label">GALERİ KASASI</div><div class="money" id="cash"></div></div><div class="pill">⭐ <span id="rep"></span></div></div>
<div class="level"><span>Lv.<b id="lvl"></b></span><div class="bar"><i id="xp"></i></div><span id="xpt"></span></div>
</header>
<main>
<section class="screen active" id="market"><div class="section"><div class="hero"><h1>Ucuza al, parlat, kârla sat</h1><p>İkinci el araçları al, hazırla ve pazarlıkla sat.</p><div class="stats"><div class="stat"><b id="stock"></b><small>Stok</small></div><div class="stat"><b id="profit"></b><small>Toplam kâr</small></div><div class="stat"><b id="sales"></b><small>Satış</small></div></div></div><div class="head"><h2>Oto Pazarı</h2><span id="timer"></span></div><div class="list" id="marketList"></div></div></section>
<section class="screen" id="garage"><div class="section"><div class="head"><h2>Garaj</h2><span>Araç hazırla</span></div><div id="garageBox"></div></div></section>
<section class="screen" id="showroom"><div class="section"><div class="head"><h2>Showroom</h2><span>Müşteri teklifleri</span></div><div id="showroomBox"></div></div></section>
<section class="screen" id="upgrades"><div class="section"><div class="head"><h2>Geliştirmeler</h2><span>Kalıcı bonus</span></div><div class="grid" id="upgradeList"></div></div></section>
<section class="screen" id="stats"><div class="section"><div class="head"><h2>İstatistikler</h2></div><div id="statsBox"></div></div></section>
</main>
<nav class="tabs">
<button class="tab active" data-s="market"><span>🛒</span>Pazar</button><button class="tab" data-s="garage"><span>🧰</span>Garaj</button><button class="tab" data-s="showroom"><span>🏢</span>Showroom</button><button class="tab" data-s="upgrades"><span>⬆️</span>Geliştir</button><button class="tab" data-s="stats"><span>📊</span>İstatistik</button>
</nav>
</div><div class="toast" id="toast"></div>
<script>
(()=>{
"use strict";
const K="car_dealer_tycoon_v2",$=x=>document.getElementById(x),now=()=>Date.now(),fmt=n=>"₺"+Math.floor(Number(n)||0).toLocaleString("tr-TR");
const CARS=[["Seat Ibiza FR","🚗",900000],["Volkswagen Golf","🚙",1150000],["Renault Clio","🚘",760000],["Fiat Egea","🚖",820000],["Toyota Corolla","🚕",1250000],["BMW 320i","🏎️",2100000],["Cupra Formentor","🚙",2400000]];
const D=()=>({cash:1500000,rep:0,lvl:1,xp:0,stock:[],market:[],refresh:0,selected:null,totalProfit:0,sales:0,spent:0,revenue:0,up:{slots:0,mechanic:0,detail:0,sales:0}});
let S=D(),tt;
const r=(a,b)=>Math.floor(a+Math.random()*(b-a+1)),num=(v,d=0)=>Number.isFinite(+v)?+v:d;
function createCar(){const m=CARS[r(0,CARS.length-1)],age=r(1,7),km=r(15000,150000),cond=r(48,92),value=Math.floor(m[2]*(1-age*.045)*(1-km/1000000)*(.72+cond/300));return{id:Math.random().toString(36).slice(2),name:m[0],icon:m[1],age,km,cond,hidden:Math.random()<.25?r(5,16):0,inspected:false,ask:Math.floor(value*(.72+Math.random()*.22)),value,clean:0,repair:0,mods:0,listed:false,offer:null,customerReadyAt:0,expenses:0}}
function normalizeCar(c){if(!c||typeof c!=="object")return null;const model=CARS.find(x=>x[0]===c.name)||CARS[0];return{id:String(c.id||Math.random().toString(36).slice(2)),name:String(c.name||model[0]),icon:String(c.icon||model[1]),age:Math.max(0,num(c.age,1)),km:Math.max(0,num(c.km,10000)),cond:Math.min(100,Math.max(1,num(c.cond,60))),hidden:Math.max(0,num(c.hidden,0)),inspected:!!c.inspected||num(c.hidden,0)===0,ask:Math.max(1,num(c.ask,model[2]*.7)),value:Math.max(1,num(c.value,model[2])),clean:Math.min(3,Math.max(0,num(c.clean,0))),repair:Math.max(0,num(c.repair,0)),mods:Math.min(3,Math.max(0,num(c.mods,0))),listed:!!c.listed,offer:Number.isFinite(+c.offer)?+c.offer:null,customerReadyAt:Math.max(0,num(c.customerReadyAt,0)),expenses:Math.max(0,num(c.expenses,0))}}
function save(){try{localStorage.setItem(K,JSON.stringify(S))}catch{}}
function load(){try{const raw=JSON.parse(localStorage.getItem(K)||"{}");S=Object.assign(D(),raw)}catch{S=D()}S.up=Object.assign(D().up,S.up||{});for(const k of Object.keys(S.up))S.up[k]=Math.max(0,Math.floor(num(S.up[k],0)));S.cash=Math.max(0,num(S.cash,1500000));S.rep=Math.max(0,Math.floor(num(S.rep)));S.lvl=Math.max(1,Math.floor(num(S.lvl,1)));S.xp=Math.max(0,num(S.xp));S.totalProfit=num(S.totalProfit,num(S.profit,0));S.sales=Math.max(0,Math.floor(num(S.sales)));S.spent=Math.max(0,num(S.spent));S.revenue=Math.max(0,num(S.revenue));S.stock=(Array.isArray(S.stock)?S.stock:[]).map(normalizeCar).filter(Boolean);S.market=(Array.isArray(S.market)?S.market:[]).map(normalizeCar).filter(Boolean);if(S.market.length!==4||now()>num(S.refresh))refresh();if(!S.stock.some(c=>c.id===S.selected))S.selected=S.stock[0]?.id||null}
function refresh(){S.market=Array.from({length:4},createCar);S.refresh=now()+120000}
function cap(){return 2+S.up.slots}
function real(c){return Math.min(100,Math.max(0,c.cond-c.hidden+c.repair))}
function value(c){return Math.floor(c.value*(.8+real(c)/100*.35+c.clean*.035*(1+S.up.detail*.2)+c.mods*.05))}
function toast(x){const e=$("toast");e.textContent=x;e.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>e.classList.remove("show"),1800)}
function addXp(v){S.xp+=v;let n=S.lvl*100;while(S.xp>=n){S.xp-=n;S.lvl++;S.rep+=2;toast("Seviye atladın!");n=S.lvl*100}}
function buy(id){const c=S.market.find(x=>x.id===id);if(!c)return;if(S.stock.length>=cap())return toast("Garaj kapasitesi dolu.");if(S.cash<c.ask)return toast("Yeterli paran yok.");S.cash-=c.ask;S.spent+=c.ask;S.stock.push(c);S.market=S.market.filter(x=>x.id!==id);S.market.push(createCar());S.selected=c.id;addXp(10);toast("Araç satın alındı.");render();save()}
function serviceCost(c,t){if(t==="inspect")return c.inspected?0:2500;if(t==="wash")return c.clean>=3?0:Math.max(500,Math.floor(3500*(1-S.up.detail*.08)));if(t==="repair")return real(c)>=100?0:Math.max(5000,Math.floor((100-real(c))*650*(1-S.up.mechanic*.1)));if(t==="mod")return c.mods>=3?0:18000+c.mods*12000;return 0}
function invalidateOffer(c){if(c.listed){c.offer=null;c.customerReadyAt=now()+8000}}
function service(id,t){const c=S.stock.find(x=>x.id===id);if(!c)return;const k=serviceCost(c,t);if(k<=0)return toast(t==="inspect"?"Ekspertiz zaten yapıldı.":t==="wash"?"Araç zaten tamamen temiz.":t==="repair"?"Araç tamamen tamirli.":"Modifiye maksimum seviyede.");if(S.cash<k)return toast("Yeterli paran yok.");S.cash-=k;S.spent+=k;c.expenses+=k;if(t==="inspect"){c.hidden=0;c.inspected=true;toast("Ekspertiz tamamlandı.")}if(t==="wash"){c.clean++;toast("Araç temizlendi.")}if(t==="repair"){c.repair=Math.min(100-c.cond+c.hidden,c.repair+r(8,18));toast("Tamir tamamlandı.")}if(t==="mod"){c.mods++;toast("Modifiye uygulandı.")}invalidateOffer(c);addXp(4);render();save()}
function listCar(id){const c=S.stock.find(x=>x.id===id);if(!c)return;c.listed=true;c.offer=null;c.customerReadyAt=now()+3000;S.selected=id;toast("Showrooma çıkarıldı. Müşteri bekleniyor.");render();save()}
function generateCustomer(c){if(now()<c.customerReadyAt)return false;c.offer=Math.floor(value(c)*(.86+Math.random()*.16+S.up.sales*.025));return true}
function negotiate(mode){const c=S.stock.find(x=>x.id===S.selected&&x.listed);if(!c)return;if(c.offer==null&&!generateCustomer(c))return toast("Yeni müşteri henüz gelmedi.");if(mode==="accept"){const price=c.offer,profit=price-c.ask-c.expenses;S.cash+=price;S.revenue+=price;S.totalProfit+=profit;S.sales++;S.rep+=Math.max(1,Math.floor(Math.max(0,profit)/100000));S.stock=S.stock.filter(x=>x.id!==c.id);S.selected=S.stock.find(x=>x.listed)?.id||S.stock[0]?.id||null;addXp(18);toast("Satıldı! Net kâr: "+fmt(profit))}else if(mode==="counter"){if(Math.random()<.58+S.up.sales*.05){c.offer=Math.floor(c.offer*(1.04+Math.random()*.05));toast("Teklif yükseldi.")}else{c.offer=null;c.customerReadyAt=now()+10000;toast("Müşteri vazgeçti. Yeni müşteri bekleniyor.")}}else{c.offer=null;c.customerReadyAt=now()+8000;toast("Teklif reddedildi. Yeni müşteri bekleniyor.")}render();save()}
function upgrade(k){const keys=["slots","mechanic","detail","sales"],i=keys.indexOf(k);if(i<0)return;const base=[250000,180000,160000,220000][i],c=Math.floor(base*Math.pow(1.7,S.up[k]));if(S.cash<c)return toast("Yeterli paran yok.");S.cash-=c;S.spent+=c;S.up[k]++;toast("Geliştirme satın alındı.");render();save()}
function top(){$("cash").textContent=fmt(S.cash);$("rep").textContent=S.rep;$("lvl").textContent=S.lvl;const n=S.lvl*100;$("xpt").textContent=Math.floor(S.xp)+"/"+n;$("xp").style.width=Math.min(100,S.xp/n*100)+"%";$("stock").textContent=S.stock.length+"/"+cap();$("profit").textContent=fmt(S.totalProfit);$("sales").textContent=S.sales}
function market(){const l=Math.max(0,S.refresh-now()),m=Math.floor(l/60000),s=Math.floor(l%60000/1000);$("timer").textContent=m+":"+String(s).padStart(2,"0");$("marketList").innerHTML=S.market.map(c=>`<div class="card"><div class="row"><div class="icon">${c.icon}</div><div class="grow"><div class="name">${c.name}</div><div class="meta">${c.age} yaş · ${c.km.toLocaleString("tr-TR")} km · %${c.cond}</div></div><div class="price">${fmt(c.ask)}</div></div><button class="btn gold" data-buy="${c.id}" style="width:100%;margin-top:10px" ${S.cash<c.ask||S.stock.length>=cap()?"disabled":""}>Satın Al</button></div>`).join("")}
function garage(){if(!S.stock.length){$("garageBox").innerHTML='<div class="card">Garaj boş.</div>';return}const c=S.stock.find(x=>x.id===S.selected)||S.stock[0];S.selected=c.id;const ci=serviceCost(c,"inspect"),cw=serviceCost(c,"wash"),cr=serviceCost(c,"repair"),cm=serviceCost(c,"mod");$("garageBox").innerHTML=`<div class="card"><div class="row"><div class="icon">${c.icon}</div><div class="grow"><div class="name">${c.name}</div><div class="meta">${c.age} yaş · ${c.km.toLocaleString("tr-TR")} km · Değer ${fmt(value(c))}</div></div></div><div class="meta">Kondisyon: ${c.inspected?"%"+real(c):"Ekspertiz gerekli"} · Temizlik ${c.clean}/3 · Modifiye ${c.mods}/3 · Araç gideri ${fmt(c.expenses)}</div><div class="actions"><button class="btn dark" data-a="inspect" ${ci<=0?"disabled":""}>Ekspertiz ${ci?fmt(ci):"Tamam"}</button><button class="btn blue" data-a="wash" ${cw<=0?"disabled":""}>Yıka ${cw?fmt(cw):"Maks."}</button><button class="btn dark" data-a="repair" ${cr<=0?"disabled":""}>Tamir ${cr?fmt(cr):"Tam"}</button><button class="btn dark" data-a="mod" ${cm<=0?"disabled":""}>Modifiye ${cm?fmt(cm):"Maks."}</button></div><button class="btn green" data-a="list" style="width:100%;margin-top:8px">${c.listed?"Teklifi Yenile":"Showrooma Çıkar"}</button></div><div class="list" style="margin-top:10px">${S.stock.map(x=>`<button class="card" data-sel="${x.id}" style="color:inherit;text-align:left">${x.icon} ${x.name} · ${fmt(value(x))}${x.listed?" · Showroom":""}</button>`).join("")}</div>`}
function showroom(){const listed=S.stock.filter(x=>x.listed);if(!listed.length){$("showroomBox").innerHTML='<div class="card">Showroom boş.</div>';return}let c=listed.find(x=>x.id===S.selected)||listed[0];S.selected=c.id;if(c.offer==null)generateCustomer(c);const waiting=c.offer==null,seconds=Math.max(0,Math.ceil((c.customerReadyAt-now())/1000));$("showroomBox").innerHTML=`<div class="card" style="text-align:center"><div style="font-size:56px">${waiting?"⏳":"🧑‍💼"}</div><div class="name">${waiting?"Yeni müşteri bekleniyor":"Müşteri teklifi"}</div><div class="price" style="font-size:28px">${waiting?seconds+" sn":fmt(c.offer)}</div><div class="meta">${c.name} · Tahmini değer ${fmt(value(c))}</div><div class="actions"><button class="btn green" data-n="accept" ${waiting?"disabled":""}>Kabul Et</button><button class="btn gold" data-n="counter" ${waiting?"disabled":""}>Pazarlık</button><button class="btn red" data-n="reject" ${waiting?"disabled":""}>Reddet</button></div></div><div class="list" style="margin-top:10px">${listed.map(x=>`<button class="card" data-show="${x.id}" style="color:inherit;text-align:left">${x.icon} ${x.name} · ${fmt(value(x))}${x.id===c.id?" · Seçili":""}</button>`).join("")}</div>`}
function upgrades(){const defs=[["slots","🚘","Garaj Kapasitesi"],["mechanic","🧰","Usta Mekanik"],["detail","🧽","Detaylı Temizlik"],["sales","🤝","Satış Uzmanı"]];$("upgradeList").innerHTML=defs.map((d,i)=>{const base=[250000,180000,160000,220000][i],c=Math.floor(base*Math.pow(1.7,S.up[d[0]]));return `<div class="card" style="text-align:center"><div class="icon" style="margin:auto">${d[1]}</div><div class="name">${d[2]}</div><div class="meta">Lv.${S.up[d[0]]}</div><button class="btn gold" data-up="${d[0]}" style="width:100%;margin-top:8px" ${S.cash<c?"disabled":""}>${fmt(c)}</button></div>`}).join("")}
function stats(){const inventory=S.stock.reduce((a,c)=>a+value(c),0),cashFlow=S.revenue-S.spent;$("statsBox").innerHTML=`<div class="list"><div class="card">Toplam ciro: <b>${fmt(S.revenue)}</b></div><div class="card">Toplam harcama: <b>${fmt(S.spent)}</b></div><div class="card">Gerçekleşmiş net kâr: <b>${fmt(S.totalProfit)}</b></div><div class="card">Nakit akışı: <b>${fmt(cashFlow)}</b></div><div class="card">Stok tahmini değeri: <b>${fmt(inventory)}</b></div><button class="btn red" id="reset">Oyunu Sıfırla</button></div>`}
function render(){top();market();garage();showroom();upgrades();stats()}
document.querySelector(".tabs").addEventListener("click",e=>{const b=e.target.closest(".tab");if(!b)return;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));b.classList.add("active");$(b.dataset.s).classList.add("active");render()});
$("marketList").addEventListener("click",e=>{const b=e.target.closest("[data-buy]");if(b)buy(b.dataset.buy)});
$("garageBox").addEventListener("click",e=>{const s=e.target.closest("[data-sel]"),a=e.target.closest("[data-a]");if(s){S.selected=s.dataset.sel;garage()}if(a){a.dataset.a==="list"?listCar(S.selected):service(S.selected,a.dataset.a)}});
$("showroomBox").addEventListener("click",e=>{const s=e.target.closest("[data-show]"),n=e.target.closest("[data-n]");if(s){S.selected=s.dataset.show;showroom()}if(n)negotiate(n.dataset.n)});
$("upgradeList").addEventListener("click",e=>{const b=e.target.closest("[data-up]");if(b)upgrade(b.dataset.up)});
$("statsBox").addEventListener("click",e=>{if(e.target.closest("#reset")&&confirm("Tüm ilerleme silinsin mi?")){localStorage.removeItem(K);location.reload()}});
load();render();setInterval(()=>{if(now()>S.refresh)refresh();if($("market").classList.contains("active"))market();if($("showroom").classList.contains("active"))showroom()},1000);setInterval(save,5000);window.addEventListener("beforeunload",save)
})();
</script>
</body>
</html>
