/* Horizontal branch cards */
#branchGrid.grid{grid-template-columns:1fr;gap:8px}
.branch{
  display:grid;
  grid-template-columns:minmax(0,.82fr) minmax(0,1.18fr);
  grid-template-areas:
    "top upgrades"
    "tabs upgrades"
    "money upgrades"
    "rate upgrades"
    "cap tags";
  column-gap:10px;
  row-gap:4px;
  align-items:start;
  min-height:0;
  padding:10px 11px;
  contain-intrinsic-size:142px;
}
.branch>.branchTop{grid-area:top;min-width:0}
.branch>.branchTabs{grid-area:tabs;margin-top:2px;align-self:start}
.branch>.money{grid-area:money;margin-top:3px;font-size:18px;line-height:1.05}
.branch>.rate{grid-area:rate;margin-top:0}
.branch>.upgradeRows{grid-area:upgrades;margin-top:0;gap:4px;min-width:0}
.branch>.cap{grid-area:cap;margin-top:4px;align-self:end}
.branch>.tagrow{grid-area:tags;margin-top:4px;align-self:end;justify-content:flex-end}
.branch .upgradeRow{padding:5px 7px;border-radius:9px}
.branch .upgradeRowTop strong,.branch .upgradeRowTop b{font-size:8px}
.branch .upgradeRowMeta{font-size:7px;margin-top:2px}
.branch .upgradeRow .bar{height:4px;margin-top:4px}
.branch .branchTab{padding:4px 6px;font-size:7px}
.branch .tag{font-size:7px;padding:3px 5px}
.branch.locked{
  grid-template-columns:1fr auto;
  grid-template-areas:
    "top top"
    "money rate"
    "tags tags";
  align-items:end;
  min-height:92px;
}
.branch.locked>.money{font-size:15px;margin-top:7px}
.branch.locked>.rate{text-align:right;align-self:end;margin-bottom:1px}
.branch.locked>.tagrow{justify-content:flex-start}
@media(max-width:430px){
  .branch{grid-template-columns:minmax(0,.78fr) minmax(0,1.22fr);column-gap:8px;padding:9px}
  .branch>.money{font-size:16px}
  .branch .district{font-size:11px}
  .branch .lvl{font-size:8px}
  .branch .upgradeRow{padding:4px 6px}
  .branch .upgradeRowMeta span:first-child{max-width:64%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .branch>.tagrow{gap:3px}
}
@media(max-width:350px){
  .branch{grid-template-columns:minmax(0,.74fr) minmax(0,1.26fr);column-gap:6px;padding:8px}
  .branch .branchTab{padding:3px 5px;font-size:6px}
  .branch .upgradeRowMeta{font-size:6px}
  .branch .tag{font-size:6px}
}


/* Ultra compact two-line branch cards */

.branch{display:block!important;min-height:0!important;padding:7px 8px!important;border-radius:12px!important;contain-intrinsic-size:88px!important}
.branchCompactTop{display:flex;align-items:center;gap:6px;min-width:0}
.branchIdentity{min-width:0;flex:1}
.branchIdentity .district{font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.branchIdentity .lvl{font-size:8px;margin-top:1px;white-space:nowrap}
.branchMiniStats{display:grid;grid-template-columns:repeat(3,auto);gap:4px;flex-shrink:0}
.branchMiniStat{min-width:46px;padding:4px 5px;border:1px solid var(--line);border-radius:7px;background:rgba(14,9,7,.66);text-align:center;line-height:1.05}

function startEvent(id){if(state.events.active)return;const e=state.events.offers.find(x=>x.id===id);if(!e)return;if(state.cash<e.cost){setInfo('⚠️','Yetersiz kasa',fmt(e.cost)+' gerekiyor.');return}state.cash-=e.cost;state.stats.spend+=e.cost;state.events.active={...e,startedAt:now(),endsAt:now()+e.duration};state.events.offers=[];bigNotify('🎪','ETKİNLİK BAŞLADI',e.name+' • '+formatDuration(e.duration));renderAll();save()}
function completeEventIfDue(){const e=state.events.active;if(!e||now()<e.endsAt)return false;state.cash+=e.rewardCash;addBrandXp(e.rewardXp);const levels=addMultiplierParts(e.rewardParts);state.events.reports.unshift({name:e.name,abroad:e.abroad,cost:e.cost,rewardCash:e.rewardCash,net:e.rewardCash-e.cost,rewardXp:e.rewardXp,rewardParts:e.rewardParts,completedAt:now()});state.events.reports=state.events.reports.slice(0,10);state.events.active=null;state.events.offers=[0,1,2].map(makeEventOffer);bigNotify('✨','ETKİNLİK TAMAMLANDI',e.name+' • '+fmt(e.rewardCash)+' • +'+plain(e.rewardXp)+' EXP • +'+e.rewardParts+' parça');if(levels)bigNotify('✦','Marka Çarpanı yükseldi','Lv.'+state.multiplierLevel);save();return true}
function formatDuration(ms){const h=Math.floor(ms/3600000),m=Math.floor(ms%3600000/60000),s=Math.floor(ms%60000/1000);return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')}
function tick(dt){completeEventIfDue();maybeStartMiniGame();const t=now(),temp=temporaryMultiplier(),protection=temp>1,perm=permanentMultiplier();let overflow=0;for(const x of allBranches())if(x.b.unlocked){const cap=capacity(x.city,x.i,x.j),gain=branchRateBase(x.city,x.i,x.j)*perm*temp*dt,next=x.b.stored+gain;if(protection&&next>cap){overflow+=next-cap;x.b.stored=cap}else x.b.stored=Math.min(cap,next)}if(overflow>0){state.cash+=overflow;state.stats.collect+=overflow;state.stats.autoCollect+=overflow}if(protection)sweepBurstProtection(t);else if(t-num(state.lastAutoSweep)>=1000)runAutomation();const due=Math.floor((t-state.lastChest)/CHEST_MS);if(due>0){const p=Math.min(due,5);openChest(p);state.lastChest+=p*CHEST_MS}if(t-lastMissionCheck>=1000){checkMissions();lastMissionCheck=t}renderTop();renderLive();if(currentPage==='events'&&t-lastEventRender>=1000){renderEvents();lastEventRender=t}if(currentPage==='map'&&t-lastMapRender>=1000){renderMap();lastMapRender=t}}
let nextFrameAt=0,lastLoopErrorAt=0;function loop(t){try{if(!document.hidden&&t>=nextFrameAt){const current=now(),dt=clamp((current-lastTick)/1000,0,1);lastTick=current;tick(dt);nextFrameAt=t+250}}catch(err){console.error('Oyun döngüsü hatası:',err);if(now()-lastLoopErrorAt>5000){lastLoopErrorAt=now();setInfo('🛠️','Oyun döngüsü toparlandı','Bir arayüz hatası yakalandı; oyun çalışmaya devam ediyor.')}}finally{requestAnimationFrame(loop)}}
function setInfo(i,t,s){bigNotify(i,t,s)}
let hudQueue=[],hudBusy=false,hudTimer=null,lastHudKey='',lastHudAt=0;
const MAX_HUD_QUEUE=8;
let rewardBurstTimer=null;
function showRewardBurst(icon,title,sub){const box=$('rewardBurst');if(!box)return;$('rewardBurstIcon').textContent=icon||'🎁';$('rewardBurstTitle').textContent=title||'ÖDÜL';$('rewardBurstSub').textContent=sub||'';box.classList.remove('hidden');clearTimeout(rewardBurstTimer);rewardBurstTimer=setTimeout(()=>box.classList.add('hidden'),2300)}
function bigNotify(icon,title,sub){
 if(!state)return;
 const item={icon,title,sub,time:now()},key=String(icon||'')+'|'+String(title||'')+'|'+String(sub||'');
 if(key===lastHudKey&&item.time-lastHudAt<1500)return;
 lastHudKey=key;lastHudAt=item.time;
 if(['🎁','⚡','✨','🏆','✦'].includes(String(icon||''))||/JACKPOT|TAMAMLANDI|ÖDÜL|x5000|Marka seviyesi/i.test(String(title||'')))showRewardBurst(icon,title,sub);
 if(hudQueue.length>=MAX_HUD_QUEUE)hudQueue.splice(0,hudQueue.length-MAX_HUD_QUEUE+1);
 hudQueue.push(item);runHudQueue();
}
function renderHud(){if(!$('hudList')||!state)return;$('hudList').innerHTML=''}
function runHudQueue(){if(hudBusy||!hudQueue.length||!$('hudList'))return;hudBusy=true;const x=hudQueue.shift();$('hudList').innerHTML=`<div class="hudMsg" id="hudCurrent"><div class="hudMsgIcon">${x.icon||'•'}</div><div><div class="hudMsgTitle">${x.title||''}</div>${x.sub?`<div class="hudMsgSub">${x.sub}</div>`:''}</div></div>`;const el=$('hudCurrent');requestAnimationFrame(()=>el&&el.classList.add('show'));clearTimeout(hudTimer);hudTimer=setTimeout(()=>{if(el){el.classList.remove('show');el.classList.add('hide')}setTimeout(()=>{$('hudList').innerHTML='';hudBusy=false;runHudQueue()},180)},820)}
function seedHudQueue(){}
function updateProfileUI(){if(!state)return;$('playerTag').textContent=saveHealthy?'OTOMATİK KAYIT ✓':'KAYIT HATASI'}
function multiplierText(v){v=Math.round(num(v,1)*100)/100;return Number.isInteger(v)?String(v):v.toFixed(2).replace(/0+$/,'').replace(/\.$/,'')}


function renderTop(){
  updateProfileUI();
  const need=brandNeed(),pct=state.brandLevel>=MAX.brand?100:clamp(state.brandXp/need*100,0,100),t=now();
  state.multipliers=state.multipliers.filter(m=>m.until>t);
  const offlineTemp=state.multipliers.find(m=>m.label==='offline'),temp=offlineTemp||state.multipliers.reduce((a,m)=>!a||m.value>a.value?m:a,null),perm=permanentMultiplier();
  $('brandLevel').textContent=state.brandLevel>=MAX.brand?'MAX':state.brandLevel;
  $('brandXpText').textContent=state.brandLevel>=MAX.brand?'MAX':plain(state.brandXp)+'/'+plain(need);
  $('brandBar').style.width=pct+'%';
  if(temp){
    $('permMultiplier').textContent=(temp.label==='offline'?'ÇEVRİMDIŞI':temp.label==='jackpot'?'JACKPOT':temp.label==='zeroalti'?'SIFIRALTI.CO':'AKTİF')+' x'+multiplierText(temp.value)+' • '+Math.ceil((temp.until-t)/1000)+'sn';
    $('permParts').textContent='x'+multiplierText(perm*temp.value);
  }else{
    $('permMultiplier').textContent='x'+multiplierText(perm)+' • '+(state.multiplierLevel>=MAX.multiplier?'MAX':'Lv.'+state.multiplierLevel);
    $('permParts').textContent=state.multiplierLevel>=MAX.multiplier?'MAX':plain(state.multiplierParts)+'/'+plain(multiplierNeed());
  }
  $('cash').textContent=fmt(state.cash);
  $('rate').textContent=fmt(totalRate());
  $('ready').textContent=fmt(readyTotal());
  if(t-lastUpgradeCheck>=2500){upgradeAvailable=candidateActions().length>0;lastUpgradeCheck=t}
  $('upgradeBtn').disabled=!upgradeAvailable;
  document.querySelectorAll('.citybtn').forEach(b=>b.classList.toggle('active',b.dataset.city===activeCity));
}
function rebuildLiveCache(){liveCache.length=0;document.querySelectorAll('[data-stored]').forEach(s=>{const k=s.dataset.stored,r=document.querySelector(`[data-rate="${k}"]`),c=document.querySelector(`[data-captext="${k}"]`),bar=document.querySelector(`[data-capbar="${k}"]`),parts=k.split('-'),city=parts[0],i=+parts[1],j=+parts[2];liveCache.push({city,i,j,s,r,c,bar})})}
function renderLive(){for(const x of liveCache){const b=branchAt(x.city,x.i,x.j);if(!b)continue;const cap=Math.max(1,capacity(x.city,x.i,x.j)),pct=clamp(b.stored/cap*100,0,100);if(x.s)x.s.textContent=fmt(b.stored);if(x.r)x.r.textContent=fmt(branchRate(x.city,x.i,x.j))+'/sn';if(x.c)x.c.textContent=Math.floor(pct)+'%';if(x.bar)x.bar.style.width=pct+'%'}}
function renderBranches(){const list=state.city[activeCity],data=DATA[activeCity];$('cityTitle').textContent=CITY_NAMES[activeCity]+' Şubeleri';$('branchCount').textContent=list.filter(d=>d.unlocked).length+' / '+list.length;$('branchGrid').innerHTML=list.map((d,i)=>{const meta=data[i];if(!d.unlocked)return`<article class="panel branch locked" id="branch-card-${activeCity}-${i}"><div class="lockedMain"><div class="district">${meta.name}</div><div class="lvl">KİLİTLİ • Marka Lv.${meta.unlock}</div></div><div><div class="money">${fmt(districtOpenCost(activeCity,i))}</div><div class="rate">Açılış maliyeti</div></div><span class="tag">${meta.storeType}</span></article>`;const j=clamp(d.activeBranch,0,d.branches.length-1),b=d.branches[j],cap=capacity(activeCity,i,j),pct=clamp(b.stored/cap*100,0,100),tabs=d.branches.map((x,k)=>`<button class="branchTab ${k===j?'active':''}" data-select-branch="${activeCity}|${i}|${k}">Ş${k+1}</button>`).join('')+(d.branches.length<5?`<span class="branchTab locked">Ş${d.branches.length+1} 🔒</span>`:'');return`<article class="panel branch" id="branch-card-${activeCity}-${i}"><div class="branchCompactTop"><div class="branchIdentity"><div class="district">${meta.name} • Şube ${j+1}</div><div class="lvl">Lv.${b.level}/${MAX.branch} • x${BRANCH_INCOME[j]}</div></div><div class="branchMiniStats"><div class="branchMiniStat"><small>YÖNETİCİ</small><b>${b.manager}/${MAX.manager}</b></div><div class="branchMiniStat"><small>PERSONEL</small><b>${b.staff}/${MAX.staff}</b></div><div class="branchMiniStat"><small>PORTFÖY</small><b>${b.portfolio}/${MAX.portfolio}</b></div></div></div><div class="branchCompactBottom"><span class="branchMetric"><strong data-rate="${activeCity}-${i}-${j}">${fmt(branchRate(activeCity,i,j))}/sn</strong></span><span class="branchMetric"><strong data-stored="${activeCity}-${i}-${j}">${fmt(b.stored)}</strong></span><span class="branchMetric branchCompactCap">KASA <strong data-captext="${activeCity}-${i}-${j}">${Math.floor(pct)}%</strong><span class="miniBar"><i data-capbar="${activeCity}-${i}-${j}" style="width:${pct}%"></i></span></span><span class="branchMetric live">AKTİF</span>${automationRule(b.manager)?`<span class="branchMetric live">OTO %${Math.round(automationRule(b.manager).threshold*100)}</span>`:''}${branchFullyMaxed(b)?'<span class="branchMetric maxed">MAX +%100</span>':''}<span class="branchMetric">${meta.storeType}</span><div class="branchTabs compactTabs">${tabs}</div></div></article>`}).join('');document.querySelectorAll('[data-select-branch]').forEach(btn=>btn.addEventListener('click',()=>{const[c,i,j]=btn.dataset.selectBranch.split('|');state.city[c][+i].activeBranch=+j;renderBranches();save()}));rebuildLiveCache()}
function renderMissions(){
  ensureMissions();
  const grid=$('missionGrid');
  if(!grid)return;
  $('missionSeries').textContent='';
  if(!state.missions.length){
    grid.innerHTML='<article class="panel mission"><div class="missionTitle">Yeni görev hazırlanıyor…</div></article>';
    return;
  }
  grid.innerHTML=state.missions.map(m=>{
    const v=Math.max(0,missionValue(m.type));
    const target=Math.max(1,num(m.target,1));
    const p=clamp(v/target*100,0,100);
    const label=m.label||missionLabel(m.type,target)||'Görev';
    const badge=m.special?'ÖZEL • '+String(m.focus||'').toUpperCase():String(m.difficulty||'ORTA').toUpperCase();
    return `<article class="panel mission ${m.special?'special':''}"><div class="missionTop"><div><div class="eventBadge ${m.special?'special':''}">${badge}</div><div class="missionTitle">${label}</div></div><div class="reward">${fmt(m.rewardCash)} • ${plain(m.rewardXp)} EXP</div></div><div class="missionMeta"><span>${plain(Math.min(v,target))} / ${plain(target)}</span><span>${Math.floor(p)}%</span></div><div class="bar"><i style="width:${p}%"></i></div></article>`;
  }).join('');
}
function renderMap(){const list=state.city[activeCity],data=DATA[activeCity];$('mapTitle').textContent=CITY_NAMES[activeCity]+' Şube Ağı';$('mapSummary').textContent=list.filter(d=>d.unlocked).length+' açık';$('mapGrid').innerHTML=list.map((d,i)=>{const income=d.unlocked?d.branches.reduce((sum,b,j)=>sum+branchRate(activeCity,i,j),0):0,maxed=d.unlocked&&d.branches.every(branchFullyMaxed);return`<article class="mapNode ${d.unlocked?'':'locked'} ${maxed?'maxed':''}" data-map-district="${i}"><div class="mapNodeTop"><div class="mapNodeName">${data[i].name}</div><div class="idx">${String(i+1).padStart(2,'0')}</div></div><div class="mapNodeIncome">${d.unlocked?fmt(income)+'/sn':'Marka Lv.'+data[i].unlock}</div><div class="mapNodeMeta">${d.unlocked?d.branches.length+' / 5 şube • '+(maxed?'TAMAMEN MAX':'gelişim sürüyor'):'Açılış '+fmt(districtOpenCost(activeCity,i))}</div></article>`}).join('');document.querySelectorAll('[data-map-district]').forEach(el=>el.addEventListener('click',()=>{const i=+el.dataset.mapDistrict;if(!state.city[activeCity][i].unlocked)return;switchPage('game');requestAnimationFrame(()=>document.getElementById(`branch-card-${activeCity}-${i}`)?.scrollIntoView({behavior:'smooth',block:'center'}))}))}
function renderEvents(){completeEventIfDue();const e=state.events.active;if(e){$('eventStatus').textContent='Aktif etkinlik';const left=Math.max(0,e.endsAt-now()),pct=clamp((now()-e.startedAt)/e.duration*100,0,100);$('eventGrid').innerHTML=`<article class="panel eventCard ${e.abroad?'special':''}"><span class="eventBadge ${e.abroad?'special':''}">${e.abroad?'YURT DIŞI ÖZEL':'AKTİF ETKİNLİK'}</span><div class="eventTitle">${e.name}</div><div class="eventCountdown">${formatDuration(left)}</div><div class="eventReward">Ödül ${fmt(e.rewardCash)} • +${plain(e.rewardXp)} EXP • +${e.rewardParts} parça</div><div class="eventProgress"><div class="bar"><i style="width:${pct}%"></i></div></div></article>`}else{ensureEventOffers();$('eventStatus').textContent='3 teklif';$('eventGrid').innerHTML=state.events.offers.map(x=>`<article class="panel eventCard ${x.abroad?'special':''}"><span class="eventBadge ${x.abroad?'special':''}">${x.abroad?'YURT DIŞI ÖZEL':'TÜRKİYE ETKİNLİĞİ'}</span><div class="eventTitle">${x.name}</div><div class="eventMeta"><div class="eventMetric"><small>KATILIM</small><b>${fmt(x.cost)}</b></div><div class="eventMetric"><small>SÜRE</small><b>${formatDuration(x.duration).slice(0,5)}</b></div><div class="eventMetric"><small>GETİRİ</small><b>x${x.factor}</b></div></div><div class="eventReward">${fmt(x.rewardCash)} • +${plain(x.rewardXp)} EXP • +${x.rewardParts} parça</div><button class="eventAction" data-event-id="${x.id}" ${state.cash<x.cost?'disabled':''}>ETKİNLİĞE KATIL</button></article>`).join('');document.querySelectorAll('[data-event-id]').forEach(b=>b.addEventListener('click',()=>startEvent(b.dataset.eventId)))}$('eventReports').innerHTML=state.events.reports.length?state.events.reports.map(r=>`<article class="panel report"><div class="reportTop"><div class="reportName">${r.name}</div><div class="reportDate">${new Date(r.completedAt).toLocaleString('tr-TR')}</div></div><div class="reportMeta">Katılım ${fmt(r.cost)} • Ödül ${fmt(r.rewardCash)} • Net ${fmt(r.net)}<br>+${plain(r.rewardXp)} EXP • +${r.rewardParts} çarpan parçası</div></article>`).join(''):'<article class="panel report"><div class="reportMeta">Henüz tamamlanan etkinlik yok.</div></article>'}
function renderAll(){lastUpgradeCheck=0;renderTop();renderBranches();if(currentPage==='missions')renderMissions();if(currentPage==='map')renderMap();if(currentPage==='events')renderEvents()}
function switchPage(p){currentPage=p;lastMapRender=0;lastEventRender=0;document.querySelectorAll('.page').forEach(x=>x.classList.add('hidden'));$('page-'+p).classList.remove('hidden');document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.page===p));if(p==='missions')renderMissions();if(p==='map')renderMap();if(p==='events')renderEvents()}
$('rewardBurst').addEventListener('click',()=>$('rewardBurst').classList.add('hidden'));


document.querySelectorAll('.citybtn').forEach(b=>b.addEventListener('click',()=>{activeCity=b.dataset.city;renderAll()}));document.querySelectorAll('.tab').forEach(b=>b.addEventListener('click',()=>switchPage(b.dataset.page)));$('collectBtn').addEventListener('click',collectAll);$('upgradeBtn').addEventListener('click',smartUpgrade);window.addEventListener('pagehide',save);window.addEventListener('beforeunload',save);document.addEventListener('visibilitychange',()=>{if(document.hidden){if(miniGameRuntime)endMiniGame(false);save()}else{applyOffline();completeEventIfDue();lastTick=now();nextFrameAt=0;renderAll();save()}});load();setTimeout(seedHudQueue,250);
