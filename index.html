<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Car Dealer Tycoon</title>
<style>
:root{--bg:#0a0f17;--p:#121a26;--p2:#182333;--l:#2d3d53;--t:#f5f7fb;--m:#9bacbf;--g:#f4c45e;--ok:#57d68a;--r:#ff6874;--b:#5ca9ff}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(#09101a,#0e1520);color:var(--t);font-family:system-ui,-apple-system,sans-serif}.app{max-width:560px;margin:auto;min-height:100vh;padding-bottom:88px}
header{position:sticky;top:0;z-index:10;background:#0a0f17ee;border-bottom:1px solid var(--l);padding:10px 12px}.row{display:flex;gap:10px;align-items:center}.grow{flex:1}.logo,.icon{display:grid;place-items:center;background:var(--p2);border:1px solid var(--l);border-radius:15px}.logo{width:46px;height:46px;font-size:25px}.icon{width:54px;height:54px;font-size:29px}
.label{font-size:10px;color:var(--m);letter-spacing:.12em;font-weight:800}.money{font-size:23px;font-weight:900;color:var(--g)}.pill{padding:8px 10px;background:var(--p);border:1px solid var(--l);border-radius:12px;font-weight:800}
.bar{height:9px;background:#1d2a3c;border:1px solid #2d415b;border-radius:99px;overflow:hidden;flex:1}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--g),#ff9c48)}
.level{display:flex;gap:8px;align-items:center;margin-top:8px;font-size:11px;color:var(--m)}
.screen{display:none}.screen.active{display:block}.section{padding:12px}.hero{padding:16px;border-radius:22px;background:linear-gradient(135deg,#1b293d,#101824);border:1px solid #344b68}.hero h1{margin:8px 0 5px;font-size:24px}.hero p,.meta{color:var(--m);font-size:12px}.stats,.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}.stat,.card{background:linear-gradient(var(--p),#0d1520);border:1px solid var(--l);border-radius:17px;padding:12px}.stat{text-align:center}.stat b{display:block}
.head{display:flex;justify-content:space-between;align-items:center;margin:16px 2px 10px}.head h2{font-size:18px;margin:0}.head span{font-size:11px;color:var(--m)}.list{display:grid;gap:10px}.name{font-weight:900}.price{font-weight:900;color:var(--g)}
.btn{border:0;border-radius:12px;padding:10px 12px;font-weight:900}.btn:disabled{opacity:.4}.gold{background:var(--g);color:#201600}.dark{background:#26364b;color:white;border:1px solid #3b526f}.green{background:var(--ok);color:#07180e}.red{background:var(--r);color:#2a070a}.blue{background:var(--b);color:#07182c}.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(560px,100%);display:grid;grid-template-columns:repeat(5,1fr);background:#0a0f17f7;border-top:1px solid var(--l);padding:8px 6px}.tab{background:none;border:0;color:var(--m);display:flex;flex-direction:column;align-items:center;font-size:10px}.tab span{font-size:21px}.tab.active{color:var(--g)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(15px);opacity:0;transition:.2s;background:#09111b;border:1px solid #3b5574;border-radius:12px;padding:10px 14px}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:390px){.stats,.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
<header>
<div class="row"><div class="logo">🚗</div><div class="grow"><div class="label">GALERİ KASASI</div><div class="money" id="cash"></div></div><div class="pill">⭐ <span id="rep"></span></div></div>
<div class="level"><span>Lv.<b id="lvl"></b></span><div class="bar"><i id="xp"></i></div><span id="xpt"></span></div>
</header>
<main>
<section class="screen active" id="market"><div class="section"><div class="hero"><h1>Ucuza al, parlat, kârla sat</h1><p>İkinci el araçları al, hazırla ve pazarlıkla sat.</p><div class="stats"><div class="stat"><b id="stock"></b><small>Stok</small></div><div class="stat"><b id="profit"></b><small>Toplam kâr</small></div><div class="stat"><b id="sales"></b><small>Satış</small></div></div></div><div class="head"><h2>Oto Pazarı</h2><span id="timer"></span></div><div class="list" id="marketList"></div></div></section>
<section class="screen" id="garage"><div class="section"><div class="head"><h2>Garaj</h2><span>Araç hazırla</span></div><div id="garageBox"></div></div></section>
<section class="screen" id="showroom"><div class="section"><div class="head"><h2>Showroom</h2><span>Müşteri teklifleri</span></div><div id="showroomBox"></div></div></section>
<section class="screen" id="upgrades"><div class="section"><div class="head"><h2>Geliştirmeler</h2><span>Kalıcı bonus</span></div><div class="grid" id="upgradeList"></div></div></section>
<section class="screen" id="stats"><div class="section"><div class="head"><h2>İstatistikler</h2></div><div id="statsBox"></div></div></section>
</main>
<nav class="tabs">
<button class="tab active" data-s="market"><span>🛒</span>Pazar</button><button class="tab" data-s="garage"><span>🧰</span>Garaj</button><button class="tab" data-s="showroom"><span>🏢</span>Showroom</button><button class="tab" data-s="upgrades"><span>⬆️</span>Geliştir</button><button class="tab" data-s="stats"><span>📊</span>İstatistik</button>
</nav>
</div><div class="toast" id="toast"></div>
<script>
(()=>{
const K="car_dealer_tycoon_v1", $=x=>document.getElementById(x), now=()=>Date.now(), fmt=n=>"₺"+Math.floor(n||0).toLocaleString("tr-TR");
const CARS=[["Seat Ibiza FR","🚗",900000],["Volkswagen Golf","🚙",1150000],["Renault Clio","🚘",760000],["Fiat Egea","🚖",820000],["Toyota Corolla","🚕",1250000],["BMW 320i","🏎️",2100000],["Cupra Formentor","🚙",2400000]];
const D=()=>({cash:1500000,rep:0,lvl:1,xp:0,stock:[],market:[],refresh:0,selected:null,profit:0,sales:0,spent:0,revenue:0,up:{slots:0,mechanic:0,detail:0,sales:0}});
let S=D(),tt;
const r=(a,b)=>Math.floor(a+Math.random()*(b-a+1));
function car(){let m=CARS[r(0,CARS.length-1)],age=r(1,7),km=r(15000,150000),cond=r(48,92),value=Math.floor(m[2]*(1-age*.045)*(1-km/1000000)*(.72+cond/300));return{id:Math.random().toString(36).slice(2),name:m[0],icon:m[1],age,km,cond,hidden:Math.random()<.25?r(5,16):0,ask:Math.floor(value*(.72+Math.random()*.22)),value,clean:0,repair:0,mods:0,listed:false,offer:null}}
function save(){localStorage.setItem(K,JSON.stringify(S))}function load(){try{S=Object.assign(D(),JSON.parse(localStorage.getItem(K)||"{}"))}catch{}S.up=Object.assign(D().up,S.up||{});if(!Array.isArray(S.market)||S.market.length!==4||now()>S.refresh)refresh()}
function refresh(){S.market=Array.from({length:4},car);S.refresh=now()+120000}
function cap(){return 2+S.up.slots}function real(c){return Math.min(100,c.cond-c.hidden+c.repair)}function val(c){return Math.floor(c.value*(.8+real(c)/100*.35+c.clean*.035*(1+S.up.detail*.2)+c.mods*.05))}
function toast(x){let e=$("toast");e.textContent=x;e.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>e.classList.remove("show"),1800)}
function xp(v){S.xp+=v;let n=S.lvl*100;while(S.xp>=n){S.xp-=n;S.lvl++;S.rep+=2;toast("Seviye atladın!");n=S.lvl*100}}
function buy(id){let c=S.market.find(x=>x.id===id);if(!c||S.stock.length>=cap()||S.cash<c.ask)return toast("Satın alma mümkün değil.");S.cash-=c.ask;S.spent+=c.ask;S.stock.push(c);S.market=S.market.filter(x=>x.id!==id);S.market.push(car());S.selected=c.id;xp(10);toast("Araç satın alındı.");render();save()}
function cost(c,t){if(t==="inspect")return 2500;if(t==="wash")return Math.floor(3500*(1-S.up.detail*.08));if(t==="repair")return Math.max(5000,Math.floor((100-real(c))*650*(1-S.up.mechanic*.1)));return 18000+c.mods*12000}
function service(id,t){let c=S.stock.find(x=>x.id===id),k=cost(c,t);if(!c||S.cash<k)return toast("Yeterli paran yok.");S.cash-=k;S.spent+=k;if(t==="inspect")c.hidden=0;if(t==="wash")c.clean=Math.min(3,c.clean+1);if(t==="repair")c.repair+=r(8,18);if(t==="mod")c.mods=Math.min(3,c.mods+1);xp(4);render();save()}
function list(id){let c=S.stock.find(x=>x.id===id);if(c){c.listed=true;c.offer=null;S.selected=id;toast("Showrooma çıkarıldı.");render();save()}}
function customer(c){c.offer=Math.floor(val(c)*(.86+Math.random()*.16+S.up.sales*.025))}
function negotiate(mode){let c=S.stock.find(x=>x.id===S.selected&&x.listed);if(!c)return;if(!c.offer)customer(c);if(mode==="accept"){let p=c.offer,pr=p-c.ask;S.cash+=p;S.revenue+=p;S.profit+=pr;S.sales++;S.rep+=Math.max(1,Math.floor(pr/100000));S.stock=S.stock.filter(x=>x.id!==c.id);S.selected=S.stock[0]?.id||null;xp(18);toast("Satıldı! Kâr: "+fmt(pr))}else if(mode==="counter"){if(Math.random()<.58+S.up.sales*.05){c.offer=Math.floor(c.offer*(1.04+Math.random()*.05));toast("Teklif yükseldi.")}else{c.offer=null;toast("Müşteri vazgeçti.")}}else{c.offer=null;toast("Teklif reddedildi.")}render();save()}
function up(k){let i=["slots","mechanic","detail","sales"].indexOf(k),base=[250000,180000,160000,220000][i],c=Math.floor(base*Math.pow(1.7,S.up[k]));if(S.cash<c)return;S.cash-=c;S.spent+=c;S.up[k]++;render();save()}
function top(){$("cash").textContent=fmt(S.cash);$("rep").textContent=S.rep;$("lvl").textContent=S.lvl;let n=S.lvl*100;$("xpt").textContent=Math.floor(S.xp)+"/"+n;$("xp").style.width=Math.min(100,S.xp/n*100)+"%";$("stock").textContent=S.stock.length+"/"+cap();$("profit").textContent=fmt(S.profit);$("sales").textContent=S.sales}
function market(){let l=Math.max(0,S.refresh-now()),m=Math.floor(l/60000),s=Math.floor(l%60000/1000);$("timer").textContent=m+":"+String(s).padStart(2,"0");$("marketList").innerHTML=S.market.map(c=>`<div class="card" data-buy="${c.id}"><div class="row"><div class="icon">${c.icon}</div><div class="grow"><div class="name">${c.name}</div><div class="meta">${c.age} yaş · ${c.km.toLocaleString("tr-TR")} km · %${c.cond}</div></div><div class="price">${fmt(c.ask)}</div></div><button class="btn gold" style="width:100%;margin-top:10px" ${S.cash<c.ask||S.stock.length>=cap()?"disabled":""}>Satın Al</button></div>`).join("")}
function garage(){if(!S.stock.length){$("garageBox").innerHTML='<div class="card">Garaj boş.</div>';return}let c=S.stock.find(x=>x.id===S.selected)||S.stock[0];S.selected=c.id;$("garageBox").innerHTML=`<div class="card"><div class="row"><div class="icon">${c.icon}</div><div class="grow"><div class="name">${c.name}</div><div class="meta">${c.age} yaş · ${c.km.toLocaleString("tr-TR")} km · Değer ${fmt(val(c))}</div></div></div><div class="meta">Kondisyon: ${c.hidden?"Ekspertiz gerekli":"%"+real(c)} · Temizlik ${c.clean}/3 · Modifiye ${c.mods}/3</div><div class="actions"><button class="btn dark" data-a="inspect">Ekspertiz ${fmt(cost(c,"inspect"))}</button><button class="btn blue" data-a="wash">Yıka ${fmt(cost(c,"wash"))}</button><button class="btn dark" data-a="repair">Tamir ${fmt(cost(c,"repair"))}</button><button class="btn dark" data-a="mod">Modifiye ${fmt(cost(c,"mod"))}</button></div><button class="btn green" data-a="list" style="width:100%;margin-top:8px">Showrooma Çıkar</button></div><div class="list" style="margin-top:10px">${S.stock.map(x=>`<button class="card" data-sel="${x.id}" style="color:inherit;text-align:left">${x.icon} ${x.name} · ${fmt(val(x))}</button>`).join("")}</div>`}
function showroom(){let ls=S.stock.filter(x=>x.listed);if(!ls.length){$("showroomBox").innerHTML='<div class="card">Showroom boş.</div>';return}let c=ls.find(x=>x.id===S.selected)||ls[0];S.selected=c.id;if(!c.offer)customer(c);$("showroomBox").innerHTML=`<div class="card" style="text-align:center"><div style="font-size:56px">🧑‍💼</div><div class="name">Müşteri teklifi</div><div class="price" style="font-size:28px">${fmt(c.offer)}</div><div class="meta">${c.name} · Tahmini değer ${fmt(val(c))}</div><div class="actions"><button class="btn green" data-n="accept">Kabul Et</button><button class="btn gold" data-n="counter">Pazarlık</button><button class="btn red" data-n="reject">Reddet</button></div></div>`}
function upgrades(){let defs=[["slots","🚘","Garaj Kapasitesi"],["mechanic","🧰","Usta Mekanik"],["detail","🧽","Detaylı Temizlik"],["sales","🤝","Satış Uzmanı"]];$("upgradeList").innerHTML=defs.map((d,i)=>{let base=[250000,180000,160000,220000][i],c=Math.floor(base*Math.pow(1.7,S.up[d[0]]));return `<div class="card" data-up="${d[0]}" style="text-align:center"><div class="icon" style="margin:auto">${d[1]}</div><div class="name">${d[2]}</div><div class="meta">Lv.${S.up[d[0]]}</div><button class="btn gold" style="width:100%;margin-top:8px" ${S.cash<c?"disabled":""}>${fmt(c)}</button></div>`}).join("")}
function stats(){$("statsBox").innerHTML=`<div class="list"><div class="card">Toplam ciro: <b>${fmt(S.revenue)}</b></div><div class="card">Toplam harcama: <b>${fmt(S.spent)}</b></div><div class="card">Net kâr: <b>${fmt(S.profit)}</b></div><button class="btn red" id="reset">Oyunu Sıfırla</button></div>`}
function render(){top();market();garage();showroom();upgrades();stats()}
document.querySelector(".tabs").onclick=e=>{let b=e.target.closest(".tab");if(!b)return;document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));document.querySelectorAll(".screen").forEach(x=>x.classList.remove("active"));b.classList.add("active");$(b.dataset.s).classList.add("active");render()}
$("marketList").onclick=e=>{let c=e.target.closest("[data-buy]");if(c)buy(c.dataset.buy)}
$("garageBox").onclick=e=>{let s=e.target.closest("[data-sel]"),a=e.target.closest("[data-a]");if(s){S.selected=s.dataset.sel;garage()}if(a){a.dataset.a==="list"?list(S.selected):service(S.selected,a.dataset.a)}}
$("showroomBox").onclick=e=>{let n=e.target.closest("[data-n]");if(n)negotiate(n.dataset.n)}
$("upgradeList").onclick=e=>{let c=e.target.closest("[data-up]");if(c)up(c.dataset.up)}
$("statsBox").onclick=e=>{if(e.target.closest("#reset")&&confirm("Tüm ilerleme silinsin mi?")){localStorage.removeItem(K);location.reload()}}
load();render();setInterval(()=>{if(now()>S.refresh)refresh();if($("market").classList.contains("active"))market()},1000);setInterval(save,5000)
})();
</script>
</body>
</html>
