<!doctype html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Idle Fusion Stabil v9</title>
<style>
:root{--bg:#080d18;--p:#111a2c;--p2:#19263d;--line:#2b3d5c;--text:#f8fafc;--muted:#9fb0c8;--violet:#7c3aed;--gold:#fbbf24;--green:#34d399;--red:#fb7185;--blue:#38bdf8}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:linear-gradient(#080d18,#0c1423);color:var(--text);font-family:system-ui,-apple-system,"Segoe UI",sans-serif}button,select{font:inherit;color:inherit}.app{max-width:620px;margin:auto;padding-bottom:82px}.top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;gap:8px;padding:12px;background:#080d18ee;border-bottom:1px solid var(--line)}.wallet{text-align:right;font-size:12px}.screen{display:none;padding:12px}.screen.active{display:block}.card{background:var(--p);border:1px solid var(--line);border-radius:16px;padding:12px;margin-bottom:10px}.row{display:flex;justify-content:space-between;align-items:center;gap:8px}.muted{color:var(--muted);font-size:12px}.arena{position:relative;height:290px;border:1px solid var(--line);border-radius:18px;overflow:hidden;background:radial-gradient(circle at 50% 0,#4c1d95,transparent 48%),linear-gradient(#17233a,#0e1627)}.arena:after{content:"";position:absolute;left:0;right:0;bottom:0;height:30%;background:#17263f;clip-path:polygon(0 48%,18% 25%,35% 48%,55% 20%,74% 45%,100% 22%,100% 100%,0 100%)}.stage{position:absolute;top:10px;left:10px;right:10px;display:flex;justify-content:space-between;z-index:2}.fighters{position:absolute;inset:55px 10px 20px;display:flex;justify-content:space-around;align-items:flex-end;z-index:2}.unit{text-align:center;width:45%}.sprite{font-size:78px;transition:transform .12s,filter .12s;user-select:none}.attack-right{transform:translateX(20px)}.attack-left{transform:translateX(-20px)}.hit{filter:brightness(2)}.bar{height:10px;background:#293750;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;transition:width .15s}.hp{background:var(--red)}.hero-hp{background:var(--green)}.mana{background:var(--blue)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:6px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.btn{border:1px solid var(--line);border-radius:10px;background:#263752;padding:7px 8px;min-height:38px;font-size:13px;font-weight:750;line-height:1.15}.btn.primary{background:var(--violet)}.btn.good{background:#047857}.btn.danger{background:#9f1239}.btn:disabled{opacity:.4}.full{width:100%}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.stat{background:var(--p2);border:1px solid var(--line);border-radius:12px;padding:8px;text-align:center}.stat small{display:block;color:var(--muted);font-size:10px}.skillbar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}.skill{min-height:56px;position:relative;padding:6px}.skill span{display:block;font-size:20px}.cd{position:absolute;inset:0;display:grid;place-items:center;background:#060912d9;border-radius:12px}.list{display:grid;gap:6px}.item{display:flex;justify-content:space-between;align-items:center;gap:8px;background:var(--p2);border:1px solid var(--line);border-radius:11px;padding:8px}.actions{display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end}.actions .btn{min-height:34px;padding:6px 7px;font-size:12px}.gold{color:var(--gold)}.tabs{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:min(620px,100%);display:grid;grid-template-columns:repeat(5,1fr);background:#080d18f5;border-top:1px solid var(--line)}.tab{border:0;background:none;padding:6px 2px;color:var(--muted);font-size:9px;min-height:52px}.tab strong{display:block;font-size:18px}.tab.active{color:#c4b5fd}.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-8px);opacity:0;z-index:20;background:white;color:#111827;padding:9px 13px;border-radius:999px;transition:.2s;pointer-events:none}.toast.show{opacity:1;transform:translateX(-50%)}.float{position:absolute;z-index:8;font-weight:900;animation:up .7s forwards;pointer-events:none}.crit{color:var(--gold);font-size:22px}.heal{color:var(--green)}@keyframes up{to{opacity:0;transform:translateY(-55px)}}
@media(max-width:390px){.sprite{font-size:62px}.stats{grid-template-columns:1fr 1fr}.btn{padding:6px 7px;min-height:36px;font-size:12px}.skill{min-height:52px}.skill span{font-size:19px}}
</style>
</head>
<body>
<div class="app">
<header class="top"><b>IDLE FUSION</b><div class="wallet"><span class="gold">◉ <span id="gold">0</span></span><br>◆ <span id="gems">0</span> · 🔑 <span id="keys">0</span> · 🔩 <span id="dust">0</span></div></header>
<main>
<section class="screen active" data-screen="battle">
<div id="arena" class="arena"><div class="stage"><b id="zone">Karanlık Orman</b><b>Bölüm <span id="stage">1</span></b></div><div class="fighters"><div class="unit"><div id="heroSprite" class="sprite">🛡️</div><b id="heroName">Savaşçı</b></div><div class="unit"><div id="enemySprite" class="sprite">👹</div><b id="enemyName">Gölge</b></div></div></div>
<div class="card"><div class="row"><b>Düşman</b><span>◉ <span id="reward">0</span></span></div><div class="row muted"><span>Can</span><span id="enemyHpText"></span></div><div class="bar"><i id="enemyHpBar" class="hp"></i></div><div class="row muted"><span>Kahraman</span><span id="heroHpText"></span></div><div class="bar"><i id="heroHpBar" class="hero-hp"></i></div><div class="row muted"><span>Mana</span><span id="manaText"></span></div><div class="bar"><i id="manaBar" class="mana"></i></div></div>
<div class="grid2"><button id="manual" class="btn primary">⚔️ Vur</button><button id="heal" class="btn good">💚 İyileş</button></div>
<div id="skillbar" class="skillbar" style="margin-top:8px"></div>
<div class="stats" style="margin-top:10px"><div class="stat"><small>Saldırı</small><b id="atk"></b></div><div class="stat"><small>Can</small><b id="maxHp"></b></div><div class="stat"><small>Hız</small><b id="speed"></b></div><div class="stat"><small>Kritik</small><b id="crit"></b></div></div>
<div id="upgrades" class="grid2" style="margin-top:8px"></div>
</section>
<section class="screen" data-screen="hero"><div class="card"><div class="row"><b>Sınıf</b><select id="classSelect"><option value="warrior">Savaşçı</option><option value="archer">Okçu</option><option value="mage">Büyücü</option></select></div></div><h3>Yetenekler</h3><div id="skills" class="list"></div></section>
<section class="screen" data-screen="gear"><div class="grid2"><button id="openChest" class="btn primary">Sandık Aç 🔑1</button><button id="equipBest" class="btn good">En İyiyi Kuşan</button></div><h3>Kuşanılan</h3><div id="equipped" class="list"></div><h3>Çanta <span id="bagCount" class="muted"></span></h3><div id="inventory" class="list"></div></section>
<section class="screen" data-screen="quests"><h3>Görevler</h3><div id="quests" class="list"></div><h3>Prestige</h3><div class="card"><div class="row"><div><b>Yükseliş</b><div class="muted">Kalıcı saldırı bonusu</div></div><button id="prestige" class="btn primary">Yüksel</button></div></div></section>
<section class="screen" data-screen="settings"><div class="card"><label><input id="autoSkills" type="checkbox"> Otomatik yetenek</label></div><div class="card"><button id="reset" class="btn danger full">Kaydı Sıfırla</button></div></section>
</main>
<nav class="tabs"><button class="tab active" data-tab="battle"><strong>⚔️</strong>Savaş</button><button class="tab" data-tab="hero"><strong>🧙</strong>Kahraman</button><button class="tab" data-tab="gear"><strong>🎒</strong>Ekipman</button><button class="tab" data-tab="quests"><strong>📜</strong>Görev</button><button class="tab" data-tab="settings"><strong>⚙️</strong>Ayar</button></nav>
</div><div id="toast" class="toast"></div>
<script>
(()=>{'use strict';
const $=id=>document.getElementById(id), SAVE='idle_fusion_stable_v9';
const CLASSES={warrior:{name:'Savaşçı',icon:'🛡️',atk:1,hp:1.35,speed:1,crit:0},archer:{name:'Okçu',icon:'🏹',atk:1.08,hp:1,speed:1.22,crit:.08},mage:{name:'Büyücü',icon:'🧙',atk:1.2,hp:.9,speed:.95,crit:.04}};
const SKILLS={burst:{name:'Güç Patlaması',icon:'💥',mana:18,cd:5,mult:4},storm:{name:'Fırtına',icon:'🌪️',mana:25,cd:8,mult:6},meteor:{name:'Meteor',icon:'☄️',mana:35,cd:12,mult:9}};
const SLOTS=['Silah','Zırh','Kask','Yüzük','Kolye'];
const ZONES=['Karanlık Orman','Kristal Mağara','Çöl Tapınağı','Buz Diyarı','Gölge Kalesi'];
const ENEMIES=['Gölge','Goblin','Kurt','İskelet','Golem','Ejder'];
const fresh=()=>({gold:2500,gems:30,keys:5,dust:50,stage:1,best:1,cls:'warrior',atkLv:1,hpLv:1,speedLv:1,critLv:1,heroHp:null,enemyHp:null,mana:100,kills:0,bossKills:0,prestige:0,skillLv:{burst:1,storm:1,meteor:1},equipped:{},inventory:[],quests:{kills:0,boss:0,gear:0},claimed:{kills:0,boss:0,gear:0},autoSkills:false,lastSeen:Date.now()});
let state=fresh(), last=performance.now(), heroTimer=0, enemyTimer=0, saveTimer=0, cooldown={burst:0,storm:0,meteor:0};
const n=v=>Number.isFinite(+v)?+v:0, clamp=(v,a,b)=>Math.max(a,Math.min(b,v)), compact=v=>Math.floor(v).toLocaleString('tr-TR');
function sanitize(raw){const f=fresh(),s={...f,...raw};s.skillLv={...f.skillLv,...(raw.skillLv||{})};s.equipped={...(raw.equipped||{})};s.inventory=Array.isArray(raw.inventory)?raw.inventory.filter(Boolean).slice(0,60):[];s.quests={...f.quests,...(raw.quests||{})};s.claimed={...f.claimed,...(raw.claimed||{})};['gold','gems','keys','dust','stage','best','atkLv','hpLv','speedLv','critLv','kills','bossKills','prestige','mana'].forEach(k=>s[k]=Math.max(0,n(s[k])));if(!CLASSES[s.cls])s.cls='warrior';s.stage=Math.max(1,Math.floor(s.stage));return s}
function load(){try{const raw=localStorage.getItem(SAVE);if(raw)state=sanitize(JSON.parse(raw))}catch(e){state=fresh()}const off=Math.min(8*3600,Math.max(0,(Date.now()-n(state.lastSeen))/1000));state.gold+=Math.floor(off*stats().passive);state.lastSeen=Date.now()}
function save(){state.lastSeen=Date.now();try{localStorage.setItem(SAVE,JSON.stringify(state))}catch(e){}}
function gearPower(i){return i?Math.floor(i.power*(1+i.level*.18)):0}
function stats(){const c=CLASSES[state.cls],gear=Object.values(state.equipped).reduce((a,i)=>a+gearPower(i),0),perm=1+state.prestige*.12;return{atk:(18+state.atkLv*6+gear*.55)*c.atk*perm,hp:(170+state.hpLv*38+gear*2)*c.hp,speed:(.85+state.speedLv*.045)*c.speed,crit:clamp(.05+state.critLv*.012+c.crit,0,.6),passive:(2+state.stage*.7+state.atkLv*.35)*perm}}
function enemyMax(){const early=state.stage<=30?.78:1;return Math.floor((85+state.stage*20)*Math.pow(1.075,state.stage-1)*early*(state.stage%10===0?3:1))}
function enemyDamage(){return Math.max(2,(8+state.stage*2.2)*Math.pow(1.035,state.stage-1)*(state.stage%10===0?1.35:1))}
function reward(){return Math.floor((25+state.stage*8)*Math.pow(1.045,state.stage-1)*(state.stage%10===0?3:1))}
function toast(t){const e=$('toast');e.textContent=t;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),1500)}
function floatText(t,cls,x){const e=document.createElement('div');e.className='float '+(cls||'');e.textContent=t;e.style.left=x+'%';e.style.top='42%';$('arena').append(e);setTimeout(()=>e.remove(),750)}
function spawn(){state.enemyHp=enemyMax();state.heroHp=clamp(state.heroHp||stats().hp,1,stats().hp)}
function hitEnemy(base,manual=false){if(state.enemyHp<=0)return;const s=stats(),crit=Math.random()<s.crit,dmg=Math.max(1,base*(crit?2:1));state.enemyHp-=dmg;$('heroSprite').classList.add('attack-right');setTimeout(()=>$('heroSprite').classList.remove('attack-right'),120);floatText(compact(dmg),crit?'crit':'',63);if(state.enemyHp<=0)killEnemy()}
function hitHero(){const s=stats(),dmg=enemyDamage();state.heroHp-=dmg;$('enemySprite').classList.add('attack-left');setTimeout(()=>$('enemySprite').classList.remove('attack-left'),120);if(state.heroHp<=0){state.heroHp=s.hp;toast('Kahraman toparlandı')}}
function killEnemy(){const boss=state.stage%10===0;state.gold+=reward();state.kills++;state.quests.kills++;if(boss){state.bossKills++;state.quests.boss++;state.keys++;state.gems+=2}state.stage++;state.best=Math.max(state.best,state.stage);state.heroHp=Math.min(stats().hp,state.heroHp+stats().hp*.22);spawn();save();renderAll()}
function useSkill(id){const sk=SKILLS[id],lv=state.skillLv[id];if(cooldown[id]>0||state.mana<sk.mana)return;state.mana-=sk.mana;cooldown[id]=sk.cd;hitEnemy(stats().atk*sk.mult*(1+(lv-1)*.2),true)}
function itemName(slot,rarity){const p=['Eski','Nadir','Epik','Efsanevi'][rarity];return p+' '+slot}
function makeGear(){const r=Math.random(),rarity=r>.96?3:r>.78?2:r>.45?1:0,slot=SLOTS[Math.floor(Math.random()*SLOTS.length)];return{id:Date.now()+Math.random(),slot,rarity,name:itemName(slot,rarity),power:12+rarity*18+state.stage*2,level:0}}
function equip(id){const ix=state.inventory.findIndex(i=>i.id===id);if(ix<0)return;const item=state.inventory.splice(ix,1)[0],old=state.equipped[item.slot];if(old)state.inventory.push(old);state.equipped[item.slot]=item;state.heroHp=stats().hp;save();renderAll()}
function salvage(id){const ix=state.inventory.findIndex(i=>i.id===id);if(ix<0)return;const item=state.inventory.splice(ix,1)[0];state.dust+=8+item.rarity*10+item.level*4;save();renderAll()}
function upgrade(slot){const i=state.equipped[slot];if(!i)return;const cost=12+i.level*10;if(state.dust<cost)return toast('Malzeme yetersiz');state.dust-=cost;i.level++;save();renderAll()}
function renderHud(){const s=stats(),em=enemyMax();$('gold').textContent=compact(state.gold);$('gems').textContent=compact(state.gems);$('keys').textContent=compact(state.keys);$('dust').textContent=compact(state.dust);$('stage').textContent=state.stage;$('zone').textContent=ZONES[Math.min(ZONES.length-1,Math.floor((state.stage-1)/20))];$('heroName').textContent=CLASSES[state.cls].name;$('heroSprite').textContent=CLASSES[state.cls].icon;$('enemyName').textContent=(state.stage%10===0?'Boss ':'')+ENEMIES[Math.floor((state.stage-1)/5)%ENEMIES.length];$('enemySprite').textContent=state.stage%10===0?'🐲':['👹','👺','🐺','💀','🗿'][Math.floor((state.stage-1)/5)%5];$('reward').textContent=compact(reward());$('enemyHpText').textContent=compact(Math.max(0,state.enemyHp))+'/'+compact(em);$('enemyHpBar').style.width=clamp(state.enemyHp/em*100,0,100)+'%';$('heroHpText').textContent=compact(state.heroHp)+'/'+compact(s.hp);$('heroHpBar').style.width=clamp(state.heroHp/s.hp*100,0,100)+'%';$('manaText').textContent=Math.floor(state.mana)+'/100';$('manaBar').style.width=state.mana+'%';$('atk').textContent=compact(s.atk);$('maxHp').textContent=compact(s.hp);$('speed').textContent=s.speed.toFixed(2);$('crit').textContent=Math.round(s.crit*100)+'%'}
function renderSkills(){const bar=$('skillbar'),lib=$('skills');bar.replaceChildren();lib.replaceChildren();Object.entries(SKILLS).forEach(([id,sk])=>{const b=document.createElement('button');b.className='btn skill';b.innerHTML=`<span>${sk.icon}</span>${sk.name}`;b.addEventListener('click',()=>useSkill(id));if(cooldown[id]>0){const c=document.createElement('i');c.className='cd';c.textContent=cooldown[id].toFixed(1);b.append(c)}bar.append(b);const row=document.createElement('div');row.className='item';row.innerHTML=`<div><b>${sk.icon} ${sk.name}</b><div class="muted">Sv. ${state.skillLv[id]} · ${sk.mana} mana</div></div>`;const up=document.createElement('button');const cost=5+state.skillLv[id]*3;up.className='btn primary';up.textContent='◆ '+cost;up.disabled=state.gems<cost;up.addEventListener('click',()=>{if(state.gems<cost)return;state.gems-=cost;state.skillLv[id]++;save();renderAll()});row.append(up);lib.append(row)})}
function renderUpgrades(){const box=$('upgrades');box.replaceChildren();[['atkLv','Saldırı',120],['hpLv','Can',100],['speedLv','Hız',150],['critLv','Kritik',180]].forEach(([k,nm,base])=>{const cost=Math.floor(base*Math.pow(1.14,state[k]-1)),b=document.createElement('button');b.className='btn';b.innerHTML=`${nm} +<br><span class="gold">◉ ${compact(cost)}</span>`;b.disabled=state.gold<cost;b.addEventListener('click',()=>{if(state.gold<cost)return;state.gold-=cost;state[k]++;if(k==='hpLv')state.heroHp=stats().hp;save();renderAll()});box.append(b)})}
function renderGear(){const eq=$('equipped');eq.replaceChildren();SLOTS.forEach(slot=>{const i=state.equipped[slot],row=document.createElement('div');row.className='item';row.innerHTML=`<div><b>${slot}</b><div class="muted">${i?i.name+' +'+i.level+' · Güç '+compact(gearPower(i)):'Boş'}</div></div>`;if(i){const b=document.createElement('button'),cost=12+i.level*10;b.className='btn good';b.textContent='🔩 '+cost;b.disabled=state.dust<cost;b.addEventListener('click',()=>upgrade(slot));row.append(b)}eq.append(row)});$('bagCount').textContent=state.inventory.length+'/60';const inv=$('inventory');inv.replaceChildren();state.inventory.forEach(i=>{const row=document.createElement('div');row.className='item';row.innerHTML=`<div><b>${i.name}</b><div class="muted">${i.slot} · Güç ${compact(gearPower(i))}</div></div>`;const a=document.createElement('div');a.className='actions';const e=document.createElement('button');e.className='btn';e.textContent='Kuşan';e.addEventListener('click',()=>equip(i.id));const s=document.createElement('button');s.className='btn danger';s.textContent='Erit';s.addEventListener('click',()=>salvage(i.id));a.append(e,s);row.append(a);inv.append(row)})}
function renderQuests(){const box=$('quests');box.replaceChildren();[['kills','Düşman yen',20,4],['boss','Boss yen',2,6],['gear','Eşya bul',5,5]].forEach(([id,name,base,gems])=>{const target=base*(state.claimed[id]+1),v=state.quests[id],row=document.createElement('div');row.className='item';row.innerHTML=`<div><b>${name}</b><div class="muted">${Math.min(v,target)}/${target}</div></div>`;const b=document.createElement('button');b.className='btn primary';b.textContent='◆ '+gems;b.disabled=v<target;b.addEventListener('click',()=>{if(state.quests[id]<target)return;state.quests[id]-=target;state.claimed[id]++;state.gems+=gems;save();renderAll()});row.append(b);box.append(row)});$('prestige').textContent=state.best<50?'Bölüm 50':`+${Math.floor(state.best/50)} Öz`;}
function renderAll(){renderHud();renderSkills();renderUpgrades();renderGear();renderQuests();$('classSelect').value=state.cls;$('autoSkills').checked=state.autoSkills}
$('manual').addEventListener('click',()=>hitEnemy(stats().atk*2.4,true));$('heal').addEventListener('click',()=>{if(state.mana<15)return toast('Mana yetersiz');state.mana-=15;state.heroHp=Math.min(stats().hp,state.heroHp+stats().hp*.5);floatText('+'+compact(stats().hp*.5),'heal',18)});$('classSelect').addEventListener('change',e=>{state.cls=e.target.value;state.heroHp=stats().hp;save();renderAll()});$('autoSkills').addEventListener('change',e=>{state.autoSkills=e.target.checked;save()});
$('openChest').addEventListener('click',()=>{if(state.keys<1)return toast('Anahtar yok');state.keys--;for(let x=0;x<3;x++){if(state.inventory.length<60){state.inventory.unshift(makeGear());state.quests.gear++}}save();renderAll()});$('equipBest').addEventListener('click',()=>{SLOTS.forEach(slot=>{const options=[...state.inventory.filter(i=>i.slot===slot),...(state.equipped[slot]?[state.equipped[slot]]:[])].sort((a,b)=>gearPower(b)-gearPower(a));if(!options[0])return;const best=options[0],old=state.equipped[slot];state.inventory=state.inventory.filter(i=>i.id!==best.id);if(old&&old.id!==best.id)state.inventory.push(old);state.equipped[slot]=best});state.heroHp=stats().hp;save();renderAll()});
$('prestige').addEventListener('click',()=>{if(state.best<50)return toast('Bölüm 50 gerekli');const gain=Math.floor(state.best/50);state.prestige+=gain;Object.assign(state,{stage:1,atkLv:1,hpLv:1,speedLv:1,critLv:1});spawn();save();renderAll();toast('Kalıcı güç +'+gain)});$('reset').addEventListener('click',()=>{if(!confirm('Tüm kayıt silinsin mi?'))return;localStorage.removeItem(SAVE);state=fresh();spawn();save();renderAll()});
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('active',x===t));document.querySelectorAll('.screen').forEach(x=>x.classList.toggle('active',x.dataset.screen===t.dataset.tab))}));
function loop(now){const dt=Math.min(.1,(now-last)/1000);last=now;const s=stats();heroTimer+=dt*s.speed;enemyTimer+=dt*.28;saveTimer+=dt;while(heroTimer>=1){heroTimer-=1;hitEnemy(s.atk)}while(enemyTimer>=1){enemyTimer-=1;hitHero()}state.mana=Math.min(100,state.mana+dt*5);for(const id in cooldown)cooldown[id]=Math.max(0,cooldown[id]-dt);if(state.autoSkills){const id=Object.keys(SKILLS).find(i=>cooldown[i]<=0&&state.mana>=SKILLS[i].mana);if(id)useSkill(id)}state.gold+=s.passive*dt;if(saveTimer>=5){saveTimer=0;save()}renderHud();renderSkills();requestAnimationFrame(loop)}
load();spawn();renderAll();requestAnimationFrame(loop);
})();
</script>
</body>
</html>
