<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#080b14" />
  <title>Neon Idle</title>
  <style>
    :root{
      --bg:#080b14;
      --panel:#111727;
      --line:rgba(255,255,255,.08);
      --text:#f7f9ff;
      --muted:#8e99b2;
      --cyan:#57e6ff;
      --blue:#6476ff;
      --purple:#a55cff;
      --green:#53efa1;
    }
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at top left,rgba(100,118,255,.18),transparent 35%),
        radial-gradient(circle at top right,rgba(165,92,255,.14),transparent 30%),
        var(--bg);
      color:var(--text);
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    }
    body{overflow-x:hidden}
    button{font:inherit}
    .app{
      max-width:480px;
      margin:0 auto;
      min-height:100vh;
      padding:20px 16px 40px;
    }
    .title{
      margin:4px 0 18px;
      font-size:18px;
      font-weight:900;
      letter-spacing:.8px;
    }
    .balance{
      padding:22px;
      border:1px solid var(--line);
      border-radius:24px;
      background:linear-gradient(145deg,rgba(87,230,255,.08),rgba(17,23,39,.95));
      box-shadow:0 20px 60px rgba(0,0,0,.34);
    }
    .label{
      color:var(--muted);
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:1.3px;
    }
    .money{
      margin:8px 0 5px;
      font-size:42px;
      font-weight:900;
      letter-spacing:-1.5px;
    }
    .rate{
      color:var(--green);
      font-weight:800;
      font-size:14px;
    }
    .tap-area{
      display:grid;
      place-items:center;
      padding:34px 0 28px;
    }
    .tap-button{
      width:188px;
      height:188px;
      border:0;
      border-radius:50%;
      color:white;
      cursor:pointer;
      position:relative;
      background:
        radial-gradient(circle at 35% 30%,rgba(255,255,255,.65),rgba(87,230,255,.12) 10%,rgba(100,118,255,.2) 35%,#0b1120 70%),
        conic-gradient(var(--cyan),var(--blue),var(--purple),var(--cyan));
      box-shadow:
        0 0 0 10px rgba(255,255,255,.025),
        0 0 55px rgba(87,230,255,.22);
      transition:transform .08s ease;
    }
    .tap-button:active{transform:scale(.96)}
    .tap-inner{
      position:absolute;
      inset:15px;
      border-radius:50%;
      background:radial-gradient(circle at 35% 30%,#18213a,#0b1020 72%);
      border:1px solid rgba(255,255,255,.12);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }
    .tap-inner span:first-child{
      color:var(--muted);
      font-size:12px;
      letter-spacing:1.2px;
      text-transform:uppercase;
    }
    .tap-value{
      margin-top:7px;
      font-size:30px;
      font-weight:900;
    }
    .section-title{
      margin:0 2px 12px;
      font-size:17px;
    }
    .upgrades{
      display:grid;
      gap:10px;
    }
    .upgrade{
      display:grid;
      grid-template-columns:52px 1fr auto;
      gap:12px;
      align-items:center;
      padding:13px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(17,23,39,.88);
    }
    .icon{
      width:52px;
      height:52px;
      border-radius:15px;
      display:grid;
      place-items:center;
      font-size:23px;
      background:linear-gradient(145deg,rgba(100,118,255,.23),rgba(165,92,255,.17));
    }
    .upgrade h3{
      margin:0 0 4px;
      font-size:14px;
    }
    .upgrade p{
      margin:0;
      color:var(--muted);
      font-size:11px;
    }
    .buy{
      min-width:80px;
      padding:10px 12px;
      border:0;
      border-radius:12px;
      color:white;
      font-weight:900;
      background:linear-gradient(135deg,var(--blue),var(--purple));
    }
    .buy:disabled{opacity:.32}
    .toast{
      position:fixed;
      left:50%;
      top:18px;
      transform:translate(-50%,-120%);
      z-index:20;
      background:#121a2d;
      border:1px solid var(--line);
      border-radius:14px;
      padding:11px 15px;
      font-size:13px;
      transition:.25s;
      white-space:nowrap;
    }
    .toast.show{transform:translate(-50%,0)}
    .float{
      position:fixed;
      z-index:10;
      pointer-events:none;
      color:var(--cyan);
      font-weight:900;
      animation:floatUp .7s ease-out forwards;
    }
    @keyframes floatUp{
      to{transform:translateY(-65px);opacity:0}
    }
  </style>
</head>
<body>
  <main class="app">
    <div class="title">NEON IDLE</div>

    <section class="balance">
      <div class="label">Toplam Enerji</div>
      <div class="money" id="money">0</div>
      <div class="rate"><span id="perSec">0</span> / saniye</div>
    </section>

    <div class="tap-area">
      <button class="tap-button" id="tapButton">
        <span class="tap-inner">
          <span>Enerji Üret</span>
          <strong class="tap-value">+<span id="tapPower">1</span></strong>
        </span>
      </button>
    </div>

    <h2 class="section-title">Yükseltmeler</h2>
    <section class="upgrades" id="upgrades"></section>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    (() => {
      const items = [
        { id:'drone', name:'Nano Drone', icon:'🛸', base:15, income:1 },
        { id:'lab', name:'Quantum Lab', icon:'🧪', base:120, income:8 },
        { id:'reactor', name:'Fusion Reactor', icon:'⚛️', base:950, income:52 },
        { id:'network', name:'Neural Network', icon:'🧠', base:7800, income:410 },
        { id:'station', name:'Orbital Station', icon:'🛰️', base:62000, income:3200 }
      ];

      const defaultState = {
        money:0,
        total:0,
        tapPower:1,
        owned:{drone:0,lab:0,reactor:0,network:0,station:0},
        lastSeen:Date.now()
      };

      let state = load();

      const moneyEl = document.getElementById('money');
      const perSecEl = document.getElementById('perSec');
      const tapPowerEl = document.getElementById('tapPower');
      const upgradesEl = document.getElementById('upgrades');
      const toastEl = document.getElementById('toast');

      function load(){
        try{
          const saved = JSON.parse(localStorage.getItem('neonIdleSave'));
          return saved ? {
            ...defaultState,
            ...saved,
            owned:{...defaultState.owned,...saved.owned}
          } : structuredClone(defaultState);
        }catch{
          return structuredClone(defaultState);
        }
      }

      function save(){
        state.lastSeen = Date.now();
        localStorage.setItem('neonIdleSave', JSON.stringify(state));
      }

      function format(n){
        if(n < 1000) return Math.floor(n).toLocaleString('tr-TR');
        const units = ['K','M','B','T','Qa'];
        let index = -1;
        while(n >= 1000 && index < units.length - 1){
          n /= 1000;
          index++;
        }
        return n.toLocaleString('tr-TR',{maximumFractionDigits:n < 10 ? 2 : 1}) + units[index];
      }

      function price(item){
        return Math.floor(item.base * Math.pow(1.15, state.owned[item.id]));
      }

      function incomePerSecond(){
        return items.reduce((sum,item) => {
          return sum + state.owned[item.id] * item.income;
        },0);
      }

      function render(){
        moneyEl.textContent = format(state.money);
        perSecEl.textContent = format(incomePerSecond());
        tapPowerEl.textContent = format(state.tapPower);

        upgradesEl.innerHTML = '';

        items.forEach(item => {
          const cost = price(item);
          const card = document.createElement('div');
          card.className = 'upgrade';
          card.innerHTML = `
            <div class="icon">${item.icon}</div>
            <div>
              <h3>${item.name} · Lv.${state.owned[item.id]}</h3>
              <p>+${format(item.income)} enerji / saniye</p>
            </div>
            <button class="buy" ${state.money < cost ? 'disabled' : ''}>${format(cost)}</button>
          `;

          card.querySelector('button').addEventListener('click',() => {
            if(state.money < cost) return;
            state.money -= cost;
            state.owned[item.id]++;
            toast(item.name + ' geliştirildi');
            render();
            save();
          });

          upgradesEl.appendChild(card);
        });
      }

      function toast(text){
        toastEl.textContent = text;
        toastEl.classList.add('show');
        clearTimeout(window.toastTimer);
        window.toastTimer = setTimeout(() => toastEl.classList.remove('show'), 1400);
      }

      document.getElementById('tapButton').addEventListener('click', event => {
        state.money += state.tapPower;
        state.total += state.tapPower;

        const float = document.createElement('div');
        float.className = 'float';
        float.textContent = '+' + format(state.tapPower);
        float.style.left = (event.clientX - 15) + 'px';
        float.style.top = (event.clientY - 10) + 'px';
        document.body.appendChild(float);
        setTimeout(() => float.remove(),700);

        if(navigator.vibrate) navigator.vibrate(8);
        render();
      });

      function applyOfflineIncome(){
        const secondsAway = Math.min((Date.now() - state.lastSeen) / 1000, 7200);
        const reward = incomePerSecond() * secondsAway;

        if(reward >= 1){
          state.money += reward;
          state.total += reward;
          toast('Çevrimdışı kazanç: +' + format(reward));
        }
      }

      applyOfflineIncome();
      render();

      setInterval(() => {
        const gain = incomePerSecond() / 10;
        state.money += gain;
        state.total += gain;
        moneyEl.textContent = format(state.money);
        perSecEl.textContent = format(incomePerSecond());
      },100);

      setInterval(() => {
        render();
        save();
      },3000);

      document.addEventListener('visibilitychange',() => {
        if(document.hidden) save();
      });
    })();
  </script>
</body>
</html>
